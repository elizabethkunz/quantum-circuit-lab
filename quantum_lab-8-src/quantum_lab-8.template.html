<div class="toast" id="toast"></div>

<script>
/* =======================================================================
   QUANTUM SIMULATOR (browser-native, state-vector)
   Complex numbers as {re, im}. State is array of 2^n complex amplitudes.
   ======================================================================= */

const C = {
  add: (a,b) => ({re: a.re+b.re, im: a.im+b.im}),
  mul: (a,b) => ({re: a.re*b.re - a.im*b.im, im: a.re*b.im + a.im*b.re}),
  scale: (a,s) => ({re: a.re*s, im: a.im*s}),
  abs2: (a) => a.re*a.re + a.im*a.im,
  zero: {re:0, im:0},
  one:  {re:1, im:0},
  i:    {re:0, im:1}
};

// Single-qubit gate matrices (2x2, row-major, complex)
const GATES = {
  H: [
    [{re:1/Math.SQRT2,im:0},{re:1/Math.SQRT2,im:0}],
    [{re:1/Math.SQRT2,im:0},{re:-1/Math.SQRT2,im:0}]
  ],
  X: [[{re:0,im:0},{re:1,im:0}],[{re:1,im:0},{re:0,im:0}]],
  Y: [[{re:0,im:0},{re:0,im:-1}],[{re:0,im:1},{re:0,im:0}]],
  Z: [[{re:1,im:0},{re:0,im:0}],[{re:0,im:0},{re:-1,im:0}]],
  S: [[{re:1,im:0},{re:0,im:0}],[{re:0,im:0},{re:0,im:1}]],
  T: [[{re:1,im:0},{re:0,im:0}],[{re:0,im:0},{re:Math.SQRT1_2,im:Math.SQRT1_2}]]
};

function initState(n) {
  const dim = 1 << n;
  const s = new Array(dim).fill(0).map(() => ({re:0,im:0}));
  s[0] = {re:1, im:0};
  return s;
}

// Apply single-qubit gate to state.
// Qubit indexing: qubit 0 is the *least significant* bit of the basis state index.
// So for 3 qubits, basis state |q2 q1 q0> maps to index q2*4 + q1*2 + q0.
function applySingle(state, gate, target, nQubits) {
  const dim = 1 << nQubits;
  const out = new Array(dim).fill(0).map(() => ({re:0, im:0}));
  const mask = 1 << target;

  for (let i = 0; i < dim; i++) {
    if ((i & mask) === 0) {
      const j = i | mask;
      const a0 = state[i];
      const a1 = state[j];
      // |i>'s target bit is 0, |j>'s target bit is 1
      // new_a0 = g[0][0]*a0 + g[0][1]*a1
      // new_a1 = g[1][0]*a0 + g[1][1]*a1
      out[i] = C.add(C.mul(gate[0][0], a0), C.mul(gate[0][1], a1));
      out[j] = C.add(C.mul(gate[1][0], a0), C.mul(gate[1][1], a1));
    }
  }
  return out;
}

// Controlled gate (control, target, 2x2 unitary on target when control=1)
function applyControlled(state, gate, control, target, nQubits) {
  const dim = 1 << nQubits;
  const out = state.map(a => ({re:a.re, im:a.im})); // copy
  const cMask = 1 << control;
  const tMask = 1 << target;

  for (let i = 0; i < dim; i++) {
    if ((i & cMask) !== 0 && (i & tMask) === 0) {
      const j = i | tMask;
      const a0 = state[i];
      const a1 = state[j];
      out[i] = C.add(C.mul(gate[0][0], a0), C.mul(gate[0][1], a1));
      out[j] = C.add(C.mul(gate[1][0], a0), C.mul(gate[1][1], a1));
    }
  }
  return out;
}

// Probabilities per basis state
function probabilities(state) {
  return state.map(a => C.abs2(a));
}

/* =======================================================================
   CIRCUIT MODEL
   circuit = {
     nQubits: int,
     columns: Array<Column>,
   }
   Column is an array of length nQubits; each entry is one of:
     null | {type:'single', gate:'H'|'X'|...} | 
     {type:'ctrl', partner:number} |
     {type:'target', gate:'X'|'Z', partner:number} |
     {type:'meas'}
   ======================================================================= */

let circuit = { nQubits: 2, columns: [] };
const MIN_COLUMNS = 8;
const MAX_QUBITS = 5;
const MIN_QUBITS = 1;

function ensureColumns() {
  // ensure at least MIN_COLUMNS empty trailing columns so user can keep dragging
  let trailingEmpty = 0;
  for (let i = circuit.columns.length - 1; i >= 0; i--) {
    if (circuit.columns[i].every(c => c === null)) trailingEmpty++;
    else break;
  }
  const needed = Math.max(MIN_COLUMNS, circuit.columns.length + 2);
  while (circuit.columns.length < needed || trailingEmpty < 2) {
    circuit.columns.push(new Array(circuit.nQubits).fill(null));
    trailingEmpty++;
  }
  // trim too-many trailing empties
  while (circuit.columns.length > MIN_COLUMNS) {
    const last = circuit.columns[circuit.columns.length - 1];
    const secondLast = circuit.columns[circuit.columns.length - 2];
    if (last.every(c => c === null) && secondLast.every(c => c === null)) {
      circuit.columns.pop();
    } else break;
  }
}

function resizeQubits(n) {
  circuit.nQubits = n;
  circuit.columns = circuit.columns.map(col => {
    if (col.length < n) {
      return [...col, ...new Array(n - col.length).fill(null)];
    } else if (col.length > n) {
      // dropping qubits — remove any gates referencing them
      const trimmed = col.slice(0, n);
      return trimmed.map(entry => {
        if (entry && (entry.type === 'ctrl' || entry.type === 'target')) {
          if (entry.partner >= n) return null;
        }
        return entry;
      });
    }
    return col;
  });
  ensureColumns();
  render();
}

/* ---------------- RENDER ---------------- */
function render() {
  ensureColumns();
  const container = document.getElementById('circuit');
  container.innerHTML = '';

  if (circuit.columns.length === 0 || circuit.nQubits === 0) {
    container.innerHTML = '<div class="empty-hint">Your circuit is empty.<span class="mono">Drag a gate onto a wire to begin</span></div>';
    return;
  }

  const wires = document.createElement('div');
  wires.className = 'wires';

  for (let q = circuit.nQubits - 1; q >= 0; q--) {
    const row = document.createElement('div');
    row.className = 'wire-row';

    const label = document.createElement('div');
    label.className = 'wire-label';
    label.innerHTML = `q<sub>${q}</sub> <span class="state">|0⟩</span>`;
    row.appendChild(label);

    const track = document.createElement('div');
    track.className = 'wire-track';
    const line = document.createElement('div');
    line.className = 'wire-line';
    track.appendChild(line);

    const slots = document.createElement('div');
    slots.className = 'slots';

    for (let c = 0; c < circuit.columns.length; c++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.dataset.col = c;
      slot.dataset.qubit = q;

      slot.addEventListener('dragover', (e) => { e.preventDefault(); slot.classList.add('drop-target'); });
      slot.addEventListener('dragleave', () => slot.classList.remove('drop-target'));
      slot.addEventListener('drop', (e) => {
        e.preventDefault();
        slot.classList.remove('drop-target');
        const gate = e.dataTransfer.getData('gate');
        if (gate) placeGate(gate, q, c);
      });

      const entry = circuit.columns[c][q];
      if (entry) {
        const el = renderGate(entry, q, c);
        slot.appendChild(el);
      }

      slots.appendChild(slot);
    }

    track.appendChild(slots);
    row.appendChild(track);
    wires.appendChild(row);
  }

  container.appendChild(wires);

  // Draw control-target connector lines
  requestAnimationFrame(() => drawCtrlLinks());
}

function renderGate(entry, q, c) {
  if (entry.type === 'single') {
    const el = document.createElement('div');
    el.className = 'placed';
    el.textContent = entry.gate;
    el.addEventListener('click', () => removeGate(q, c));
    const x = document.createElement('button');
    x.className = 'x-btn'; x.textContent = '×';
    x.onclick = (e) => { e.stopPropagation(); removeGate(q, c); };
    el.appendChild(x);
    return el;
  }
  if (entry.type === 'ctrl') {
    const el = document.createElement('div');
    el.className = 'placed ctrl-dot';
    el.title = 'Control qubit · click to remove';
    el.addEventListener('click', () => removePair(q, c));
    return el;
  }
  if (entry.type === 'target') {
    const el = document.createElement('div');
    if (entry.gate === 'X') {
      el.className = 'placed target-x';
      el.textContent = '⊕';
    } else {
      el.className = 'placed';
      el.textContent = entry.gate;
    }
    el.title = 'Target · click to remove';
    el.addEventListener('click', () => removePair(q, c));
    return el;
  }
  if (entry.type === 'meas') {
    const el = document.createElement('div');
    el.className = 'placed meas';
    el.textContent = '◎';
    el.addEventListener('click', () => removeGate(q, c));
    const x = document.createElement('button');
    x.className = 'x-btn'; x.textContent = '×';
    x.onclick = (e) => { e.stopPropagation(); removeGate(q, c); };
    el.appendChild(x);
    return el;
  }
  return document.createElement('div');
}

function drawCtrlLinks() {
  // remove previous
  document.querySelectorAll('.ctrl-link').forEach(el => el.remove());

  const circuitEl = document.getElementById('circuit');
  const circuitRect = circuitEl.getBoundingClientRect();

  for (let c = 0; c < circuit.columns.length; c++) {
    const col = circuit.columns[c];
    const ctrlQs = [];
    const tgtQs = [];
    col.forEach((e, q) => {
      if (e && e.type === 'ctrl') ctrlQs.push(q);
      if (e && e.type === 'target') tgtQs.push(q);
    });
    if (ctrlQs.length && tgtQs.length) {
      const qA = Math.min(...ctrlQs, ...tgtQs);
      const qB = Math.max(...ctrlQs, ...tgtQs);
      const slotA = document.querySelector(`.slot[data-col="${c}"][data-qubit="${qA}"]`);
      const slotB = document.querySelector(`.slot[data-col="${c}"][data-qubit="${qB}"]`);
      if (slotA && slotB) {
        const rA = slotA.getBoundingClientRect();
        const rB = slotB.getBoundingClientRect();
        const link = document.createElement('div');
        link.className = 'ctrl-link';
        const topY = Math.min(rA.top, rB.top) - circuitRect.top + rA.height/2;
        const bottomY = Math.max(rA.top, rB.top) - circuitRect.top + rA.height/2;
        link.style.top = topY + 'px';
        link.style.height = (bottomY - topY) + 'px';
        link.style.left = (rA.left - circuitRect.left + rA.width/2) + 'px';
        link.style.transform = 'translateX(-50%)';
        circuitEl.appendChild(link);
      }
    }
  }
}

/* ---------------- PLACE / REMOVE ---------------- */
function placeGate(gate, qubit, col) {
  ensureColumns();
  // column exists
  if (!circuit.columns[col]) return;
  const existing = circuit.columns[col][qubit];

  if (gate === 'CNOT' || gate === 'CZ') {
    // Need a partner qubit. Place control on `qubit`, target on the nearest free qubit.
    let target = -1;
    // prefer adjacent
    const candidates = [];
    for (let q = 0; q < circuit.nQubits; q++) {
      if (q !== qubit) candidates.push(q);
    }
    candidates.sort((a,b) => Math.abs(a-qubit) - Math.abs(b-qubit));
    for (const q of candidates) {
      if (circuit.columns[col][q] === null) { target = q; break; }
    }
    if (target === -1) { toast('No free qubit in this column for a 2-qubit gate.', true); return; }
    if (existing !== null) { toast('Slot is occupied.', true); return; }

    circuit.columns[col][qubit] = { type: 'ctrl', partner: target };
    circuit.columns[col][target] = { type: 'target', gate: gate === 'CNOT' ? 'X' : 'Z', partner: qubit };
    ensureColumns();
    render();
    return;
  }

  if (existing !== null) { toast('Slot occupied — click to remove first.', true); return; }

  if (gate === 'M') {
    circuit.columns[col][qubit] = { type: 'meas' };
  } else {
    circuit.columns[col][qubit] = { type: 'single', gate };
  }
  ensureColumns();
  render();
}

function removeGate(q, c) {
  const e = circuit.columns[c][q];
  if (!e) return;
  if (e.type === 'ctrl' || e.type === 'target') {
    removePair(q, c);
    return;
  }
  circuit.columns[c][q] = null;
  ensureColumns();
  render();
}

function removePair(q, c) {
  const e = circuit.columns[c][q];
  if (!e) return;
  circuit.columns[c][e.partner] = null;
  circuit.columns[c][q] = null;
  ensureColumns();
  render();
}

/* ---------------- SIMULATE ---------------- */
/* =======================================================================
   SIMULATION with optional depolarizing noise.
   Model: after each gate, with probability p, apply a uniformly random
   non-identity Pauli (X, Y, or Z) on each qubit the gate acted on.
   When p=0 we run the exact simulator once. When p>0 we run N shots,
   each with fresh random errors, and report the empirical distribution.
   ======================================================================= */
const SHOTS = 1024;

function randomPauli() {
  const r = Math.floor(Math.random() * 3);
  return r === 0 ? GATES.X : r === 1 ? GATES.Y : GATES.Z;
}

// Run circuit once and return the final state vector.
// If noise p > 0, inject random Paulis stochastically.
function runOnce(p) {
  let state = initState(circuit.nQubits);
  for (let c = 0; c < circuit.columns.length; c++) {
    const col = circuit.columns[c];
    const processed = new Set();
    // two-qubit gates first
    for (let q = 0; q < circuit.nQubits; q++) {
      const e = col[q];
      if (!e || processed.has(q)) continue;
      if (e.type === 'ctrl') {
        const target = e.partner;
        const tgtEntry = col[target];
        if (tgtEntry && tgtEntry.type === 'target') {
          const gateName = tgtEntry.gate;
          state = applyControlled(state, GATES[gateName], q, target, circuit.nQubits);
          processed.add(q); processed.add(target);
          if (p > 0) {
            if (Math.random() < p) state = applySingle(state, randomPauli(), q, circuit.nQubits);
            if (Math.random() < p) state = applySingle(state, randomPauli(), target, circuit.nQubits);
          }
        }
      }
    }
    // single-qubit gates
    for (let q = 0; q < circuit.nQubits; q++) {
      if (processed.has(q)) continue;
      const e = col[q];
      if (!e) continue;
      if (e.type === 'single') {
        state = applySingle(state, GATES[e.gate], q, circuit.nQubits);
        if (p > 0 && Math.random() < p) {
          state = applySingle(state, randomPauli(), q, circuit.nQubits);
        }
      }
      // 'meas' markers don't alter the state here — we sample at the end
    }
  }
  return state;
}

// Sample a basis state index from a state vector's probability distribution
function sampleOutcome(state) {
  const probs = probabilities(state);
  const r = Math.random();
  let cum = 0;
  for (let i = 0; i < probs.length; i++) {
    cum += probs[i];
    if (r <= cum) return i;
  }
  return probs.length - 1;
}

function simulate() {
  const p = currentNoise(); // 0..0.10
  const trace = [];

  const hasGates = circuit.columns.some(col => col.some(e => e !== null));
  if (!hasGates) {
    const state = initState(circuit.nQubits);
    return {
      probs: probabilities(state),
      state,
      density: densityFromPure(state),
      trace: [{kind:'empty'}],
      noise: p,
      shots: 0
    };
  }

  // Build trace (order-preserving description of what the circuit does,
  // independent of any particular stochastic realization).
  for (let c = 0; c < circuit.columns.length; c++) {
    const col = circuit.columns[c];
    const processed = new Set();
    for (let q = 0; q < circuit.nQubits; q++) {
      const e = col[q];
      if (!e || processed.has(q)) continue;
      if (e.type === 'ctrl') {
        const target = e.partner;
        const tgtEntry = col[target];
        if (tgtEntry && tgtEntry.type === 'target') {
          trace.push({ kind: 'controlled', gate: tgtEntry.gate === 'X' ? 'CNOT' : 'CZ', control: q, target });
          processed.add(q); processed.add(target);
        }
      }
    }
    for (let q = 0; q < circuit.nQubits; q++) {
      if (processed.has(q)) continue;
      const e = col[q];
      if (!e) continue;
      if (e.type === 'single') {
        trace.push({ kind: 'single', gate: e.gate, qubit: q });
      } else if (e.type === 'meas') {
        trace.push({ kind: 'meas', qubit: q });
      }
    }
  }

  // p = 0: run once, report exact results
  if (p === 0) {
    const state = runOnce(0);
    return {
      probs: probabilities(state),
      state,
      density: densityFromPure(state),
      trace,
      noise: 0,
      shots: 0
    };
  }

  // p > 0: shot-based sampling. Each shot: fresh run with random errors.
  // Collect outcome counts AND accumulate the true mixed-state density matrix
  // ρ = (1/N) Σᵢ |ψᵢ⟩⟨ψᵢ|  where each |ψᵢ⟩ is a particular stochastic realization.
  const dim = 1 << circuit.nQubits;
  const counts = new Array(dim).fill(0);
  // Accumulate density matrix as 2D array of complex numbers
  const density = Array.from({length: dim}, () => Array.from({length: dim}, () => ({re:0, im:0})));

  for (let s = 0; s < SHOTS; s++) {
    const state = runOnce(p);
    // sample for outcome histogram
    const outcome = sampleOutcome(state);
    counts[outcome]++;
    // accumulate |ψ><ψ|  (add, then divide by SHOTS at the end)
    for (let i = 0; i < dim; i++) {
      for (let j = 0; j < dim; j++) {
        // |ψ><ψ|_{ij} = ψᵢ ψⱼ*
        const a = state[i];
        const b = state[j];
        // a * conj(b) = (a.re*b.re + a.im*b.im) + i(a.im*b.re - a.re*b.im)
        density[i][j].re += a.re*b.re + a.im*b.im;
        density[i][j].im += a.im*b.re - a.re*b.im;
      }
    }
  }
  // Average
  for (let i = 0; i < dim; i++) {
    for (let j = 0; j < dim; j++) {
      density[i][j].re /= SHOTS;
      density[i][j].im /= SHOTS;
    }
  }
  const probs = counts.map(c => c / SHOTS);
  // For the "Amplitudes" view under noise, we return the noiseless state for reference —
  // the true state is mixed and can't be written as a single amplitude vector.
  const idealState = runOnce(0);
  return { probs, state: idealState, density, trace, noise: p, shots: SHOTS, counts, mixed: true };
}

/* Build the density matrix |ψ⟩⟨ψ| from a pure state vector. */
function densityFromPure(state) {
  const dim = state.length;
  const rho = Array.from({length: dim}, () => Array.from({length: dim}, () => ({re:0, im:0})));
  for (let i = 0; i < dim; i++) {
    for (let j = 0; j < dim; j++) {
      const a = state[i];
      const b = state[j];
      rho[i][j].re = a.re*b.re + a.im*b.im;
      rho[i][j].im = a.im*b.re - a.re*b.im;
    }
  }
  return rho;
}

/* ---------------- RENDER OUTPUT ---------------- */
function formatBasisLabel(i, n) {
  let s = '';
  for (let q = n - 1; q >= 0; q--) {
    s += ((i >> q) & 1);
  }
  return '|' + s + '⟩';
}

// Global reference to the last simulation result + current output view mode.
let lastResult = null;
let currentView = 'probs'; // 'probs' | 'amps' | 'density'

function renderOutput() {
  if (!lastResult) {
    document.getElementById('prob-output').innerHTML = '<div class="placeholder-output">Build a circuit and press run to see the outcome distribution.</div>';
    return;
  }
  const n = circuit.nQubits;
  // Update panel title
  const title = document.getElementById('output-panel-title');
  if (currentView === 'probs')   title.textContent = 'Measurement probabilities';
  if (currentView === 'amps')    title.textContent = 'State vector amplitudes';
  if (currentView === 'density') title.textContent = 'Density matrix ρ';

  if (currentView === 'probs')   renderProbabilities(lastResult, n);
  else if (currentView === 'amps')    renderAmplitudes(lastResult, n);
  else if (currentView === 'density') renderDensityMatrix(lastResult, n);
}

function renderProbabilities(result, n) {
  const el = document.getElementById('prob-output');
  const { probs, noise, shots } = result;
  const entries = probs.map((p, i) => ({ i, p }));
  entries.sort((a,b) => b.p - a.p);

  const nonzero = entries.filter(e => e.p > 1e-9);
  const display = nonzero.length > 0 ? entries.slice(0, Math.min(8, entries.length)) : entries.slice(0, Math.min(4, entries.length));

  const html = '<div class="prob-list">' + display.map(({i, p}) => {
    const pct = (p * 100).toFixed(1);
    const zero = p < 1e-9 ? ' zero' : '';
    return `<div class="prob-row${zero}">
      <div class="prob-label">${formatBasisLabel(i, n)}</div>
      <div class="prob-bar-wrap"><div class="prob-bar" style="width:${Math.max(p*100, p > 1e-9 ? 1 : 0)}%"></div></div>
      <div class="prob-val">${pct}%</div>
    </div>`;
  }).join('') + '</div>';

  const hidden = entries.length - display.length;
  const note = hidden > 0 ? `<div style="font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:12px;letter-spacing:0.1em">+ ${hidden} states with &lt; 0.1% probability</div>` : '';

  el.innerHTML = html + note;
  updateShotsLabel(result);
}

function updateShotsLabel(result) {
  const label = document.getElementById('shots-label');
  if (result.noise > 0) {
    label.innerHTML = `<span style="color:var(--amber)">${result.shots} shots · ${(result.noise*100).toFixed(1)}% depolarizing noise</span>`;
  } else {
    label.textContent = 'exact · noise off';
  }
}

/* --------- Amplitude table view --------- */
function renderAmplitudes(result, n) {
  const el = document.getElementById('prob-output');
  const dim = 1 << n;
  const state = result.state;
  const parts = [];

  if (result.noise > 0) {
    parts.push(`<div class="view-note">Noise is active. The system is in a <b>mixed state</b>, which can't be written as a single amplitude vector. The table below shows the <em>ideal</em> (noise-free) amplitudes for reference. Use <b>Density ρ</b> for the true mixed state.</div>`);
  }

  parts.push(`<table class="amp-table">
    <thead>
      <tr>
        <th>Basis</th>
        <th class="num">Re(α)</th>
        <th class="num">Im(α)</th>
        <th class="num">|α|</th>
        <th class="num">|α|²</th>
        <th class="num">arg (deg)</th>
      </tr>
    </thead>
    <tbody>`);

  for (let i = 0; i < dim; i++) {
    const a = state[i];
    const mag = Math.sqrt(a.re*a.re + a.im*a.im);
    const mag2 = mag*mag;
    const phase = (Math.atan2(a.im, a.re) * 180 / Math.PI);
    const tiny = mag < 1e-6;
    const bigMag = mag > 0.3 ? ' big' : '';
    const reFmt = fmtNum(a.re);
    const imFmt = fmtNum(a.im);
    const magFmt = fmtNum(mag);
    const mag2Fmt = fmtNum(mag2);
    const phaseFmt = tiny ? '—' : phase.toFixed(1) + '°';

    parts.push(`<tr class="${tiny ? 'tiny' : ''}">
      <td class="basis">${formatBasisLabel(i, n)}</td>
      <td class="num${Math.abs(a.re) < 1e-9 ? ' zero' : ''}">${reFmt}</td>
      <td class="num${Math.abs(a.im) < 1e-9 ? ' zero' : ''}">${imFmt}</td>
      <td class="num mag${bigMag}">${magFmt}</td>
      <td class="num">${mag2Fmt}</td>
      <td class="num phase">${phaseFmt}</td>
    </tr>`);
  }

  parts.push(`</tbody></table>`);

  // Dimension note
  parts.push(`<div style="font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:14px;letter-spacing:0.1em">dim ℋ = 2<sup>${n}</sup> = ${dim} · Σ|α|² = ${fmtNum(state.reduce((s,a) => s + a.re*a.re + a.im*a.im, 0))}</div>`);

  el.innerHTML = parts.join('');
  updateShotsLabel(result);
}

function fmtNum(x) {
  if (Math.abs(x) < 1e-9) return '0.000';
  if (Math.abs(x) >= 10) return x.toFixed(2);
  return x.toFixed(3);
}

/* --------- Density matrix view --------- */
function renderDensityMatrix(result, n) {
  const el = document.getElementById('prob-output');
  const dim = 1 << n;

  if (n > 4) {
    el.innerHTML = `<div class="placeholder-output large">
      <div style="font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink-dim);margin-bottom:8px">Density matrix not shown for ${n} qubits (${dim}×${dim}).</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--ink-faint);letter-spacing:0.05em;max-width:46ch;margin:0 auto">Use 4 or fewer qubits to inspect ρ, or switch to Probs / Amplitudes.</div>
    </div>`;
    updateShotsLabel(result);
    return;
  }

  const rho = result.density;
  // Find max magnitude for color normalization
  let maxMag = 0;
  for (let i = 0; i < dim; i++) {
    for (let j = 0; j < dim; j++) {
      const m = Math.sqrt(rho[i][j].re*rho[i][j].re + rho[i][j].im*rho[i][j].im);
      if (m > maxMag) maxMag = m;
    }
  }
  if (maxMag === 0) maxMag = 1;

  const parts = [];
  if (result.noise > 0) {
    parts.push(`<div class="view-note">Noise is on. ρ was averaged over ${result.shots} stochastic realizations; off-diagonal (coherence) entries decay toward zero as noise grows.</div>`);
  } else {
    parts.push(`<div style="font-family:var(--mono);font-size:10px;color:var(--ink-faint);letter-spacing:0.1em;margin-bottom:12px">Pure state: ρ = |ψ⟩⟨ψ| · Tr(ρ²) = 1.000</div>`);
  }

  // Build grid
  parts.push(`<div class="dm-wrap"><div class="dm-grid" style="grid-template-columns: auto repeat(${dim}, 28px);">`);

  // Column headers
  parts.push(`<div class="dm-col-head"></div>`);
  for (let j = 0; j < dim; j++) {
    parts.push(`<div class="dm-col-head">${formatBasisLabel(j, n)}</div>`);
  }

  // Rows
  for (let i = 0; i < dim; i++) {
    parts.push(`<div class="dm-row-head">${formatBasisLabel(i, n)}</div>`);
    for (let j = 0; j < dim; j++) {
      const z = rho[i][j];
      const mag = Math.sqrt(z.re*z.re + z.im*z.im);
      const t = mag / maxMag;   // 0..1
      const color = densityColor(t, i === j);
      const tooltipVal = cellTooltip(z);
      const display = mag < 0.01 ? '' : mag.toFixed(2).replace(/^0/, '').replace('.00','');
      parts.push(`<div class="dm-cell" style="background:${color};color:${mag>0.3 ? 'var(--bg-0)' : 'var(--ink)'};">${display}<div class="cell-val">${tooltipVal}</div></div>`);
    }
  }

  parts.push(`</div>`);

  // Legend
  parts.push(`<div class="dm-legend">
    <span>|ρ<sub>ij</sub>|</span>
    <span>0</span>
    <div class="dm-legend-bar"></div>
    <span>${maxMag.toFixed(2)}</span>
  </div>`);

  // Trace and purity
  let trace = 0;
  for (let i = 0; i < dim; i++) trace += rho[i][i].re;
  // purity Tr(ρ²) = Σᵢⱼ |ρᵢⱼ|²
  let purity = 0;
  for (let i = 0; i < dim; i++) for (let j = 0; j < dim; j++) {
    const z = rho[i][j];
    purity += z.re*z.re + z.im*z.im;
  }
  parts.push(`<div style="font-family:var(--mono);font-size:10px;color:var(--ink-faint);letter-spacing:0.1em;text-align:center;margin-top:12px">
    Tr(ρ) = ${trace.toFixed(3)} · Tr(ρ²) = ${purity.toFixed(3)} ${purity < 0.99 ? '· <span style="color:var(--amber)">mixed state</span>' : '· pure state'}
  </div>`);

  parts.push(`</div>`);

  el.innerHTML = parts.join('');
  updateShotsLabel(result);
}

function densityColor(t, isDiagonal) {
  // t ∈ [0,1]. Use a palette that works with the dark theme: fade from bg-2 to phosphor green.
  // Diagonal entries (populations) get phosphor; off-diagonals (coherences) get a subtle cyan tint.
  if (t < 0.01) return 'var(--bg-2)';
  const r = isDiagonal ? 127 : 111;
  const g = isDiagonal ? 255 : 212;
  const b = isDiagonal ? 196 : 224;
  // blend from bg-2 (#161e1a = 22,30,26) to (r,g,b) as t goes 0→1
  const mix = (a, b, t) => Math.round(a + (b - a) * t);
  const R = mix(22, r, t);
  const G = mix(30, g, t);
  const B = mix(26, b, t);
  return `rgb(${R},${G},${B})`;
}

function cellTooltip(z) {
  const re = Math.abs(z.re) < 1e-9 ? 0 : z.re;
  const im = Math.abs(z.im) < 1e-9 ? 0 : z.im;
  if (re === 0 && im === 0) return '0';
  if (im === 0) return re.toFixed(4);
  if (re === 0) return `${im.toFixed(4)}i`;
  return `${re.toFixed(4)}${im >= 0 ? ' + ' : ' − '}${Math.abs(im).toFixed(4)}i`;
}

function renderNarrative(result, n) {
  const el = document.getElementById('narrative');
  const { trace, probs, noise } = result;

  if (trace.length === 0 || (trace.length === 1 && trace[0].kind === 'empty')) {
    el.innerHTML = '<p>Your circuit is empty. With no gates applied, every qubit stays in its starting state <code>|0⟩</code>, and the outcome is always <code>|' + '0'.repeat(n) + '⟩</code> with certainty.</p>';
    return;
  }

  const paragraphs = [];
  paragraphs.push(`<p><span class="step">Step 0</span>All ${n} qubit${n>1?'s':''} start in the <code>|0⟩</code> state — the quantum equivalent of switched off.</p>`);

  let step = 1;
  for (const t of trace) {
    let text = '';
    if (t.kind === 'single') {
      const g = t.gate;
      if (g === 'H') {
        text = `A <b>Hadamard</b> gate lands on <code>q${t.qubit}</code>. This qubit is now in an equal superposition — <span class="punch">both 0 and 1 simultaneously</span>, with equal weight.`;
      } else if (g === 'X') {
        text = `An <b>X</b> gate flips <code>q${t.qubit}</code>. If it was 0 it's now 1, if it was 1 it's now 0 — this is just the quantum NOT.`;
      } else if (g === 'Y') {
        text = `A <b>Y</b> gate rotates <code>q${t.qubit}</code> around the Y-axis of the Bloch sphere, flipping the bit and adding an imaginary phase.`;
      } else if (g === 'Z') {
        text = `A <b>Z</b> gate applies a 180° phase to the 1-component of <code>q${t.qubit}</code>. Invisible to measurement alone, but it matters once this qubit interferes with others.`;
      } else if (g === 'S') {
        text = `An <b>S</b> gate applies a 90° phase to the 1-component of <code>q${t.qubit}</code>.`;
      } else if (g === 'T') {
        text = `A <b>T</b> gate applies a 45° phase to <code>q${t.qubit}</code> — the finest-grained phase in the standard gate set.`;
      }
    } else if (t.kind === 'controlled') {
      if (t.gate === 'CNOT') {
        text = `A <b>CNOT</b> fires between control <code>q${t.control}</code> and target <code>q${t.target}</code>. The target flips <em>only if</em> the control is 1 — but if the control is in superposition, this binds the two qubits together. <span class="punch">This is where entanglement is born.</span>`;
      } else {
        text = `A <b>CZ</b> (controlled-Z) between <code>q${t.control}</code> and <code>q${t.target}</code>. The phase of the target flips only when the control is 1 — another way to entangle.`;
      }
    } else if (t.kind === 'meas') {
      text = `<b>Measurement</b> on <code>q${t.qubit}</code>. The qubit is forced to commit — whatever superposition it was in collapses to a definite 0 or 1, with probabilities set by the earlier gates.`;
    }
    if (text) {
      paragraphs.push(`<p><span class="step">Step ${step}</span>${text}</p>`);
      step++;
    }
  }

  // Closing interpretation based on result
  const closing = interpretResult(probs, n, noise);
  paragraphs.push(`<p><span class="step">Result</span>${closing}</p>`);

  // Noise commentary, if applicable
  if (noise > 0) {
    const gateCount = trace.filter(t => t.kind === 'single' || t.kind === 'controlled').length;
    paragraphs.push(`<p><span class="step">Noise</span>Every gate has a <code>${(noise*100).toFixed(1)}%</code> chance of misfiring — randomly applying an unwanted X, Y, or Z error. Across ${gateCount} gate${gateCount===1?'':'s'} and ${result.shots} shots, you're seeing the <span class="punch">smeared</span> version of your ideal circuit. This is roughly what today's real quantum hardware looks like before error correction kicks in.</p>`);
  }

  el.innerHTML = paragraphs.join('');
}

function interpretResult(probs, n, noise = 0) {
  const eps = noise > 0 ? 0.01 : 1e-6;             // ignore sampling noise floor
  const tol = noise > 0 ? 0.06 : 1e-4;             // how close to 50/50 is "balanced"

  const nonzero = probs
    .map((p, i) => ({ i, p }))
    .filter(x => x.p > eps)
    .sort((a,b) => b.p - a.p);

  if (nonzero.length === 0) return `Every outcome came up with near-zero probability — unlikely unless the circuit is unusual.`;

  if (nonzero.length === 1) {
    return `Every measurement will yield <code>${formatBasisLabel(nonzero[0].i, n)}</code> with certainty. The circuit produced a single classical outcome.`;
  }

  // Teleportation signature: exactly 4 outcomes, each ~25%, with one qubit always 0 or always 1.
  // (Generalized: detect "k outcomes uniformly distributed with some qubit pinned".)
  if (n >= 3 && nonzero.length >= 2) {
    const expected = 1 / nonzero.length;
    const allBalanced = nonzero.every(x => Math.abs(x.p - expected) < tol);
    if (allBalanced) {
      // Check each qubit to see if it's pinned across all nonzero outcomes
      for (let q = 0; q < n; q++) {
        const bits = nonzero.map(x => (x.i >> q) & 1);
        const allSame = bits.every(b => b === bits[0]);
        if (allSame && nonzero.length >= 4 && nonzero.length <= probs.length / 2) {
          const pinned = bits[0];
          return `A telltale signature: <code>q${q}</code> is always <code>${pinned}</code>, while the other qubits are uniformly random across ${nonzero.length} equally-likely outcomes. The ${pinned === 1 ? '|1⟩' : '|0⟩'} state <span class="punch">arrived on <code>q${q}</code></span> even though no gate acted on q${q} alone after the Bell pair formed — that's teleportation. The other qubits ended up as random byproducts.`;
        }
      }
    }
  }

  // Uniform check
  const uniform = nonzero.length === probs.length && nonzero.every(x => Math.abs(x.p - 1/probs.length) < tol);
  if (uniform) {
    return `Every basis state is roughly equally likely — a <span class="punch">uniform superposition</span>. Each outcome comes up with probability near 1/${probs.length}.`;
  }

  // Bell/GHZ-type: two dominant peaks, all-0 and all-1, balanced
  if (nonzero.length >= 2) {
    const a = nonzero[0], b = nonzero[1];
    const allZero = 0;
    const allOne = probs.length - 1;
    const isEntangledSignature = (a.i === allZero && b.i === allOne) || (a.i === allOne && b.i === allZero);
    const balanced = Math.abs(a.p - 0.5) < tol && Math.abs(b.p - 0.5) < tol;
    const dominating = (a.p + b.p) > (noise > 0 ? 0.75 : 0.99);

    if (isEntangledSignature && balanced && dominating && n >= 2) {
      return `The dominant outcomes are <code>|${'0'.repeat(n)}⟩</code> and <code>|${'1'.repeat(n)}⟩</code>, each near 50%. The qubits are <span class="punch">entangled</span> — no qubit has a definite value of its own, but they all agree when measured. Classical correlation can't produce this with local, independent coin flips.`;
    }

    if (balanced && nonzero.length === 2) {
      return `Two roughly equally likely outcomes: <code>${formatBasisLabel(a.i, n)}</code> and <code>${formatBasisLabel(b.i, n)}</code>. Before measurement, the system is in a superposition of both.`;
    }

    if (nonzero.length === 2) {
      const p0 = (a.p * 100).toFixed(1);
      const p1 = (b.p * 100).toFixed(1);
      return `Two outcomes appear: <code>${formatBasisLabel(a.i, n)}</code> at ${p0}% and <code>${formatBasisLabel(b.i, n)}</code> at ${p1}%. The unevenness comes from constructive and destructive interference of the amplitudes.`;
    }
  }

  return `The state is spread across ${nonzero.length} outcomes (above). The rest have negligible probability.`;
}

/* ---------------- EVENTS ---------------- */
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', err);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

  });
}

/* ---------------- EXAMPLES ---------------- */
const EXAMPLES = {
  superposition: {
    nQubits: 1,
    noisePreset: 0,
    place: (c) => {
      c.columns = Array(MIN_COLUMNS).fill(0).map(() => new Array(1).fill(null));
      c.columns[1][0] = { type: 'single', gate: 'H' };
      c.columns[3][0] = { type: 'meas' };
      return c;
    }
  },
  'gate-identity': {
    nQubits: 1,
    noisePreset: 0,
    place: (c) => {
      c.columns = Array(MIN_COLUMNS).fill(0).map(() => new Array(1).fill(null));
      // H, Z, H == X (on |0> → |1>)
      c.columns[1][0] = { type: 'single', gate: 'H' };

  card.style.setProperty('--ctx-color', ctx.color);
  document.getElementById('ctx-eyebrow').textContent = ctx.eyebrow;

function loadTemplate(name) {
  const ex = EXAMPLES[name];
  if (!ex) return;
  circuit.nQubits = ex.nQubits;
  circuit = ex.place(circuit);
  ensureColumns();
  render();

  // stash the template name so the run button can show the card
  activeTemplateCtx = name;

  // Apply noise preset if specified
  const noiseSlider = document.getElementById('noise-slider');
  if (noiseSlider) {
    noiseSlider.value = (ex.noisePreset || 0).toString();
    noiseSlider.dispatchEvent(new Event('input'));
  }

  // Hide any previous card visually (but keep activeTemplateCtx set)
  hideContextCard();

  // Switch to Lab view if we're not there
  switchTab('lab');
  toast('Template loaded · press Run');

  // auto-scroll to canvas
  setTimeout(() => {
    document.querySelector('.canvas-wrap').scrollIntoView({behavior:'smooth', block:'start'});
  }, 80);

  // auto-run after a beat
  setTimeout(() => document.getElementById('btn-run').click(), 600);
}

const stepProgress = {};   // step id → true when done
function markDone(stepId) {
  const card = document.querySelector(`[data-step="${stepId}"]`);
  if (!card) return;
  card.classList.add('done');
  stepProgress[stepId] = true;
  const btn = card.querySelector('.step-next');
  if (btn) btn.disabled = false;
  updateProgressPills();
}

function unlockStep(stepId) {
  const card = document.querySelector(`[data-step="${stepId}"]`);
  if (!card) return;
  card.classList.remove('locked');
  // Scroll to it smoothly
  setTimeout(() => {
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 120);
}

document.querySelectorAll('.step-next').forEach(btn => {
  btn.addEventListener('click', () => {
    const unlocks = btn.dataset.unlocks;
    if (unlocks) unlockStep(unlocks);
  });
});

function updateProgressPills() {
  const totals = { t1: 8, t2: 5, t3: 5, t4: 5 };
  const done = { t1: 0, t2: 0, t3: 0, t4: 0 };
  for (const id in stepProgress) {
    const prefix = id.slice(0, 2);
    if (done[prefix] !== undefined) done[prefix]++;
  }
  ['t1','t2','t3','t4'].forEach(t => {
    const el = document.getElementById(t + '-progress');
    if (el) el.textContent = done[t] + ' / ' + totals[t];
  });
}

/* =========================================================================
   BLOCH SPHERE — shared component
   ========================================================================= */
const blochInstances = {};

function createBloch(hostId, readoutId, options = {}) {
  const host = document.getElementById(hostId);
  if (!host) return null;

  // Qubit state: α|0⟩ + β|1⟩, stored as complex amplitudes.
  // Initial state = |0⟩ → α=1, β=0.
  let alpha = { re: 1, im: 0 };
  let beta  = { re: 0, im: 0 };

  // Camera rotation (viewer angles around x and y axes)
  let camRotX = -0.2;  // slight tilt down
  let camRotY = 0.4;   // slight turn

  // Derive Bloch-sphere coordinates (x,y,z) from (α,β).
  // Using the mixed-state-free pure-state formula:
  //   x = 2 Re(α* β),  y = 2 Im(α* β),  z = |α|² - |β|²
  function currentVec() {
    // α*β
    const aStarB_re =  alpha.re * beta.re + alpha.im * beta.im;
    const aStarB_im =  alpha.re * beta.im - alpha.im * beta.re;
    const x = 2 * aStarB_re;
    const y = 2 * aStarB_im;
    const z = (alpha.re*alpha.re + alpha.im*alpha.im)
            - (beta.re*beta.re  + beta.im*beta.im);
    return { x, y, z };
  }

  // Apply a 2x2 gate matrix to (α, β)
  function applyGate(g) {
    const newA = Cadd(Cmul(g[0][0], alpha), Cmul(g[0][1], beta));
    const newB = Cadd(Cmul(g[1][0], alpha), Cmul(g[1][1], beta));
    alpha = newA;
    beta = newB;
    draw();
    return { alpha, beta };
  }
  function Cmul(a,b) { return { re: a.re*b.re - a.im*b.im, im: a.re*b.im + a.im*b.re }; }
  function Cadd(a,b) { return { re: a.re+b.re, im: a.im+b.im }; }

  // Set to a named preset state
  function setPreset(name) {
    const S2 = 1/Math.SQRT2;
    switch(name) {
      case '0':  alpha = {re:1,im:0};  beta = {re:0,im:0}; break;
      case '1':  alpha = {re:0,im:0};  beta = {re:1,im:0}; break;
      case '+':  alpha = {re:S2,im:0}; beta = {re:S2,im:0}; break;
      case '-':  alpha = {re:S2,im:0}; beta = {re:-S2,im:0}; break;
      case '+i': alpha = {re:S2,im:0}; beta = {re:0,im:S2}; break;
      case '-i': alpha = {re:S2,im:0}; beta = {re:0,im:-S2}; break;
    }
    draw();
  }

  function reset() {
    alpha = {re:1,im:0}; beta = {re:0,im:0};
    draw();
  }

  // Project 3D (x,y,z) on the unit sphere to 2D SVG coordinates using current camera.
  // x-axis rotation first (pitch), then y-axis rotation (yaw).
  function project(x, y, z) {
    // Rotate around x-axis (tilt)
    let y1 = y * Math.cos(camRotX) - z * Math.sin(camRotX);
    let z1 = y * Math.sin(camRotX) + z * Math.cos(camRotX);
    let x1 = x;
    // Rotate around y-axis (turn)
    let x2 = x1 * Math.cos(camRotY) + z1 * Math.sin(camRotY);
    let z2 = -x1 * Math.sin(camRotY) + z1 * Math.cos(camRotY);
    let y2 = y1;
    // Orthographic: just drop z2 for screen coords
    return { sx: x2, sy: -y2, depth: z2 };  // depth>0 → in front
  }

  // Identify which named state we're closest to (for readout)
  function nearestState() {
    const v = currentVec();
    const states = {
      '|0⟩':  { x:0, y:0, z:1 },
      '|1⟩':  { x:0, y:0, z:-1 },
      '|+⟩':  { x:1, y:0, z:0 },
      '|−⟩':  { x:-1, y:0, z:0 },
      '|+i⟩': { x:0, y:1, z:0 },
      '|−i⟩': { x:0, y:-1, z:0 },
    };
    let best = null, bestDist = Infinity;
    for (const k in states) {
      const s = states[k];
      const d = (v.x-s.x)**2 + (v.y-s.y)**2 + (v.z-s.z)**2;
      if (d < bestDist) { bestDist = d; best = k; }
    }
    return { name: best, dist: Math.sqrt(bestDist) };
  }

  // Measurement probabilities  P(|0⟩) = |α|²,  P(|1⟩) = |β|²
  function measureProbs() {
    return {
      p0: alpha.re*alpha.re + alpha.im*alpha.im,
      p1: beta.re*beta.re + beta.im*beta.im
    };
  }

  function fmtC(c) {
    const r = Math.abs(c.re) < 1e-9 ? 0 : c.re;
    const i = Math.abs(c.im) < 1e-9 ? 0 : c.im;
    if (i === 0) return r.toFixed(3);
    if (r === 0) return `${i.toFixed(3)}i`;
    return `${r.toFixed(3)}${i>=0?'+':'−'}${Math.abs(i).toFixed(3)}i`;
  }

  // Draw the Bloch sphere SVG
  function draw() {
    const W = 320, H = 320, R = 120;
    const cx = W/2, cy = H/2;
    const v = currentVec();

    // Key points to draw: axis endpoints
    const axes = [
      { name:'|0⟩', x:0, y:0, z:1,  color:'var(--phos)',    isPole:true },
      { name:'|1⟩', x:0, y:0, z:-1, color:'var(--phos)',    isPole:true },
      { name:'|+⟩', x:1, y:0, z:0,  color:'var(--cyan)',    isPole:false },
      { name:'|−⟩', x:-1,y:0, z:0,  color:'var(--cyan)',    isPole:false },
      { name:'|+i⟩',x:0, y:1, z:0,  color:'var(--magenta)', isPole:false },
      { name:'|−i⟩',x:0, y:-1,z:0,  color:'var(--magenta)', isPole:false },
    ];

    // Project axis endpoints
    const pAxes = axes.map(a => ({ ...a, p: project(a.x, a.y, a.z) }));

    // Equator circle points (project many and connect)
    const equator = [];
    for (let i = 0; i <= 64; i++) {
      const t = (i/64) * 2*Math.PI;
      equator.push(project(Math.cos(t), Math.sin(t), 0));
    }
    // Meridian (x-z) circle
    const meridianXZ = [];
    for (let i = 0; i <= 64; i++) {
      const t = (i/64) * 2*Math.PI;
      meridianXZ.push(project(Math.sin(t), 0, Math.cos(t)));
    }

    // Build path strings with front/back distinction
    function pathForCircle(points) {
      // Split into front (depth >= 0) and back (depth < 0) segments
      const front = []; const back = [];
      let curF = []; let curB = [];
      for (const p of points) {
        if (p.depth >= 0) {
          if (curB.length) { back.push(curB); curB = []; }
          curF.push(p);
        } else {
          if (curF.length) { front.push(curF); curF = []; }
          curB.push(p);
        }
      }
      if (curF.length) front.push(curF);
      if (curB.length) back.push(curB);
      const toPath = (segs) => segs.map(seg => 'M ' + seg.map(p => `${cx + p.sx*R} ${cy + p.sy*R}`).join(' L ')).join(' ');
      return { front: toPath(front), back: toPath(back) };
    }

    const eqPath = pathForCircle(equator);
    const mePath = pathForCircle(meridianXZ);

    // State vector endpoint
    const vp = project(v.x, v.y, v.z);
    const vx = cx + vp.sx * R;
    const vy = cy + vp.sy * R;
    const stateInFront = vp.depth >= 0;

    // Arrow color based on proximity to |0> or |1>
    const arrowColor = 'var(--amber)';

    let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <!-- back hemisphere glow -->
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="var(--bg-0)" stroke="var(--line)" stroke-width="1" />
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#bloch-glow-${hostId})" opacity="0.35" />
      <defs>
        <radialGradient id="bloch-glow-${hostId}" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="rgba(127,255,196,0.08)" />
          <stop offset="100%" stop-color="rgba(0,0,0,0)" />
        </radialGradient>
      </defs>

      <!-- back equator & meridian (dashed/dim) -->
      <path d="${eqPath.back}" stroke="var(--line-bright)" stroke-width="1" fill="none" stroke-dasharray="2 3" opacity="0.5" />
      <path d="${mePath.back}" stroke="var(--line-bright)" stroke-width="1" fill="none" stroke-dasharray="2 3" opacity="0.5" />`;

    // Back-hemisphere axis labels (dim)
    pAxes.filter(a => a.p.depth < 0).forEach(a => {
      const ax = cx + a.p.sx * R;
      const ay = cy + a.p.sy * R;
      const off = labelOffset(a, a.p);
      svg += `<text x="${ax + off.dx}" y="${ay + off.dy}" fill="${a.color}" opacity="0.35" font-family="var(--mono)" font-size="11" text-anchor="middle">${a.name}</text>`;
    });

    // Front equator & meridian
    svg += `<path d="${eqPath.front}" stroke="var(--line-bright)" stroke-width="1" fill="none" />`;
    svg += `<path d="${mePath.front}" stroke="var(--line-bright)" stroke-width="1" fill="none" />`;

    // Arrow from center to state (only show if stateInFront)
    if (stateInFront) {
      svg += `<line x1="${cx}" y1="${cy}" x2="${vx}" y2="${vy}" stroke="${arrowColor}" stroke-width="2.5" stroke-linecap="round" />`;
      svg += `<circle cx="${vx}" cy="${vy}" r="6" fill="${arrowColor}" />`;
      svg += `<circle cx="${vx}" cy="${vy}" r="11" fill="none" stroke="${arrowColor}" stroke-width="1" opacity="0.4" />`;
    } else {
      // dim arrow if pointing back
      svg += `<line x1="${cx}" y1="${cy}" x2="${vx}" y2="${vy}" stroke="${arrowColor}" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.55" />`;
      svg += `<circle cx="${vx}" cy="${vy}" r="5" fill="${arrowColor}" opacity="0.55" />`;
    }

    // Front-hemisphere axis labels (bright)
    pAxes.filter(a => a.p.depth >= 0).forEach(a => {
      const ax = cx + a.p.sx * R;
      const ay = cy + a.p.sy * R;
      const off = labelOffset(a, a.p);
      svg += `<text x="${ax + off.dx}" y="${ay + off.dy}" fill="${a.color}" font-family="var(--mono)" font-size="11" text-anchor="middle" font-weight="500">${a.name}</text>`;
    });

    // Center dot
    svg += `<circle cx="${cx}" cy="${cy}" r="1.5" fill="var(--ink-dim)" />`;

    svg += `</svg>`;

    host.innerHTML = svg;

    // Update readout
    if (readoutId) {
      const readEl = document.getElementById(readoutId);
      const near = nearestState();
      const probs = measureProbs();
      const sp = (alpha.re*alpha.re+alpha.im*alpha.im > 0.99) ? 'definite |0⟩' :
                 (beta.re*beta.re+beta.im*beta.im > 0.99) ? 'definite |1⟩' :
                 'superposition';
      readEl.innerHTML = `
        <div><span class="rlabel">State</span> <span class="rval">α|0⟩ + β|1⟩</span></div>
        <div><span class="rlabel">α =</span> ${fmtC(alpha)}</div>
        <div><span class="rlabel">β =</span> ${fmtC(beta)}</div>
        <div><span class="rlabel">Nearest</span> <span class="rmini">${near.name}</span></div>
        <div><span class="rlabel">P(0) = </span> ${(probs.p0*100).toFixed(1)}%   <span class="rlabel">P(1) = </span> ${(probs.p1*100).toFixed(1)}%</div>
        <div><span class="rlabel">Type</span> ${sp}</div>
      `;
    }
  }

  function labelOffset(axis, p) {
    // push labels outward from sphere center along projected direction
    const len = Math.sqrt(p.sx*p.sx + p.sy*p.sy) || 1;
    const pad = 16;
    return { dx: (p.sx/len) * pad, dy: (p.sy/len) * pad + 4 };
  }

  // Drag to rotate view
  let dragging = false, dragStartX = 0, dragStartY = 0, startRotX = 0, startRotY = 0;
  host.addEventListener('pointerdown', (e) => {
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    startRotX = camRotX;
    startRotY = camRotY;
    host.setPointerCapture(e.pointerId);
    if (options.onDrag) options.onDrag();
  });
  host.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    camRotY = startRotY + dx * 0.008;
    camRotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, startRotX - dy * 0.008));
    draw();
  });
  host.addEventListener('pointerup', () => { dragging = false; });
  host.addEventListener('pointercancel', () => { dragging = false; });

  draw();

  return {
    draw,
    setPreset,
    applyGate,
    reset,
    getState: () => ({ alpha: {...alpha}, beta: {...beta} })
  };
}

/* =========================================================================
   MINI CIRCUIT RENDERER (read-only visual for tutorial steps)
   ========================================================================= */
function renderMiniCircuit(containerId, config) {
  // config = { nQubits, columns: Column[] }, where Column is same model as the Lab
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';

  const wires = document.createElement('div');
  wires.className = 'mini-wires';

  const nCols = config.columns.length;

  for (let q = config.nQubits - 1; q >= 0; q--) {
    const row = document.createElement('div');
    row.className = 'mini-wire-row';

    const label = document.createElement('div');
    label.className = 'mini-wire-label';
    label.innerHTML = `q<sub>${q}</sub>`;
    row.appendChild(label);

    const track = document.createElement('div');
    track.className = 'mini-track';
    const line = document.createElement('div');
    line.className = 'mini-line';
    track.appendChild(line);

    const slots = document.createElement('div');
    slots.className = 'mini-slots';

    for (let c = 0; c < nCols; c++) {
      const slot = document.createElement('div');
      slot.className = 'mini-slot';
      slot.dataset.col = c;
      slot.dataset.q = q;
      const entry = config.columns[c][q];
      if (entry) {
        const el = document.createElement('div');
        if (entry.type === 'single') {
          el.className = 'mini-gate'; el.textContent = entry.gate;
        } else if (entry.type === 'ctrl') {
          el.className = 'mini-gate ctrl-dot';
        } else if (entry.type === 'target') {
          el.className = entry.gate === 'X' ? 'mini-gate target-x' : 'mini-gate';
          el.textContent = entry.gate === 'X' ? '⊕' : entry.gate;
        } else if (entry.type === 'meas') {
          el.className = 'mini-gate meas'; el.textContent = '◎';
        }
        slot.appendChild(el);
      }
      slots.appendChild(slot);
    }
    track.appendChild(slots);
    row.appendChild(track);
    wires.appendChild(row);
  }

  container.appendChild(wires);

  // Draw ctrl links
  const refresh = () => {
    container.querySelectorAll('.mini-ctrl-link').forEach(e => e.remove());
    const containerRect = container.getBoundingClientRect();
    for (let c = 0; c < nCols; c++) {
      const col = config.columns[c];
      const ctrlQs = [], tgtQs = [];
      col.forEach((e, q) => {
        if (e && e.type === 'ctrl') ctrlQs.push(q);
        if (e && e.type === 'target') tgtQs.push(q);
      });
      if (ctrlQs.length && tgtQs.length) {
        const qA = Math.min(...ctrlQs, ...tgtQs);
        const qB = Math.max(...ctrlQs, ...tgtQs);
        const slotA = container.querySelector(`.mini-slot[data-col="${c}"][data-q="${qA}"]`);
        const slotB = container.querySelector(`.mini-slot[data-col="${c}"][data-q="${qB}"]`);
        if (slotA && slotB) {
          const rA = slotA.getBoundingClientRect();
          const rB = slotB.getBoundingClientRect();
          const link = document.createElement('div');
          link.className = 'mini-ctrl-link';
          const topY = Math.min(rA.top, rB.top) - containerRect.top + rA.height/2;
          const bottomY = Math.max(rA.top, rB.top) - containerRect.top + rA.height/2;
          link.style.top = topY + 'px';
          link.style.height = (bottomY - topY) + 'px';
          link.style.left = (rA.left - containerRect.left + rA.width/2) + 'px';
          link.style.transform = 'translateX(-50%)';
          container.appendChild(link);
        }
      }
    }
  };
  container._refreshLinks = refresh;
  requestAnimationFrame(refresh);
}

/* Run a config (not the live Lab circuit). Returns probability vector. */
function simulateConfig(config, noise = 0, shots = 1024) {
  const n = config.nQubits;
  const runOnceCfg = () => {
    let state = new Array(1<<n).fill(0).map(() => ({re:0,im:0}));
    state[0] = {re:1,im:0};
    for (let c = 0; c < config.columns.length; c++) {
      const col = config.columns[c];
      const processed = new Set();
      for (let q = 0; q < n; q++) {
        const e = col[q];
        if (!e || processed.has(q)) continue;
        if (e.type === 'ctrl') {
          const target = e.partner;
          const tgt = col[target];
          if (tgt && tgt.type === 'target') {
            state = applyControlled(state, GATES[tgt.gate], q, target, n);
            processed.add(q); processed.add(target);
            if (noise > 0) {
              if (Math.random() < noise) state = applySingle(state, randomPauli(), q, n);
              if (Math.random() < noise) state = applySingle(state, randomPauli(), target, n);
            }
          }
        }
      }
      for (let q = 0; q < n; q++) {
        if (processed.has(q)) continue;
        const e = col[q];
        if (!e) continue;
        if (e.type === 'single') {
          state = applySingle(state, GATES[e.gate], q, n);
          if (noise > 0 && Math.random() < noise) state = applySingle(state, randomPauli(), q, n);
        }
      }
    }
    return state;
  };
  if (noise === 0) {
    const state = runOnceCfg();
    return state.map(a => a.re*a.re + a.im*a.im);
  }
  // shot-based
  const dim = 1 << n;
  const counts = new Array(dim).fill(0);
  for (let s = 0; s < shots; s++) {
    const state = runOnceCfg();
    const ps = state.map(a => a.re*a.re + a.im*a.im);
    let r = Math.random(), cum = 0;
    for (let i = 0; i < dim; i++) {
      cum += ps[i];
      if (r <= cum) { counts[i]++; break; }
    }
  }
  return counts.map(c => c / shots);
}

function formatBasisLabelN(i, n) {
  let s = '';
  for (let q = n-1; q >= 0; q--) s += ((i>>q)&1);
  return '|' + s + '⟩';
}

function renderMiniProbs(containerId, probs, n, maxShow = 6) {
  const el = document.getElementById(containerId);
  const entries = probs.map((p,i) => ({p,i})).sort((a,b) => b.p - a.p);
  const show = entries.slice(0, maxShow);
  el.innerHTML = '<div class="prob-list">' + show.map(({i,p}) => {
    const pct = (p*100).toFixed(1);
    const zero = p < 0.005 ? ' zero' : '';
    return `<div class="prob-row${zero}">
      <div class="prob-label">${formatBasisLabelN(i,n)}</div>
      <div class="prob-bar-wrap"><div class="prob-bar" style="width:${Math.max(p*100, p>0.001?1:0)}%"></div></div>
      <div class="prob-val">${pct}%</div>
    </div>`;
  }).join('') + '</div>';
}

(function initT4Step3() {
  const cfg = {

      [null, null, null],

      [null, null, null],
      [{type:'meas'}, {type:'meas'}, {type:'meas'}],
    ]
  };
  renderMiniCircuit('mini-repcode-circuit', cfg);

  let errType = 'bit';
  const state = { one: null, two: null, guessOne: null, guessTwo: null };

  function outcome(correctable, tag) {
    return `<div class="repcode-case"><b>${tag}</b><br>${correctable ? 'Syndrome points to one bad qubit. Recovery succeeds.' : 'Recovery fails for this code in this setting.'}</div>`;
  }

  function renderCompare() {
    const box = document.getElementById('rep-compare');
    if (!box) return;
    const one = state.one == null ? '<div class="repcode-case">Case 1 not run.</div>' : outcome(state.one, 'Case 1: 1 error');
    const two = state.two == null ? '<div class="repcode-case">Case 2 not run.</div>' : outcome(state.two, 'Case 2: 2 errors');
    box.innerHTML = one + two;
  }

  function refreshProgress() {
    if (state.one !== null && state.two !== null && state.guessOne !== null && state.guessTwo !== null) {
      const ok = (state.guessOne === state.one) && (state.guessTwo === state.two);
      const fb = document.getElementById('rep-feedback');
      if (fb) fb.innerHTML = ok
        ? '<b style="color:var(--phos)">Correct.</b> In this 3-qubit repetition code, one bit-flip is correctable, two are not. Phase flips are not corrected by this code.'
        : '<b style="color:var(--red)">Re-check the comparison.</b> This code corrects exactly one bit flip. It does not correct two bit flips, and it does not protect against phase flips.';
      if (ok) markDone('t4-3');
    }
  }

  document.querySelectorAll('[data-err-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-err-type]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

    });

  document.getElementById('rep-run-one').addEventListener('click', () => {

    state.one = errType === 'bit' ? true : false;
    renderCompare();
    const fb = document.getElementById('rep-feedback');
    if (fb) fb.textContent = `Ran 1-error case: ${errType} flip on q${q}. Now answer if recovery is possible.`;
  });

  document.getElementById('rep-run-two').addEventListener('click', () => {
    const qa = parseInt(document.getElementById('rep-two-a').value, 10);
    const qb = parseInt(document.getElementById('rep-two-b').value, 10);

    if (fb) fb.textContent = `Ran 2-error case: ${errType} flips on q${qa} and q${qb}. Compare with the 1-error case.`;
  });

  document.querySelectorAll('[data-rep-guess]').forEach(btn => {
    btn.addEventListener('click', () => {
      const g = btn.dataset.repGuess;
      if (g.startsWith('one-')) state.guessOne = g.endsWith('yes');
      if (g.startsWith('two-')) state.guessTwo = g.endsWith('yes');

/* ---- T2 Step 1: product state explorer ---- */
(function initT2Step1() {
  const configs = {
    none: { probs: [1,0,0,0], formula: '|0⟩ ⊗ |0⟩ = |00⟩', note: 'Both qubits definite. Product state.' },
    h0:   { probs: [0.5,0,0.5,0], formula: '(|0⟩+|1⟩)/√2 ⊗ |0⟩ = (|00⟩+|10⟩)/√2', note: 'q0 in superposition, q1 definite.' },
    h1:   { probs: [0.5,0.5,0,0], formula: '|0⟩ ⊗ (|0⟩+|1⟩)/√2 = (|00⟩+|01⟩)/√2', note: 'q1 in superposition, q0 definite.' },
    hh:   { probs: [0.25,0.25,0.25,0.25], formula: '(|0⟩+|1⟩)/√2 ⊗ (|0⟩+|1⟩)/√2 = (|00⟩+|01⟩+|10⟩+|11⟩)/2', note: 'Both in superposition. All four outcomes equally likely.' }
  };
  const seen = new Set();
  let current = 'h0';

  function renderProductProbs(cfg) {
    const labels = ['|00⟩','|01⟩','|10⟩','|11⟩'];
    const el = document.getElementById('t2-product-probs');
    if (!el) return;
    el.innerHTML = '<div class="prob-list">' + cfg.probs.map((p,i) => {
      const pct = (p*100).toFixed(0);
      const zero = p < 0.01 ? ' zero' : '';
      return `<div class="prob-row${zero}">
        <div class="prob-label">${labels[i]}</div>
        <div class="prob-bar-wrap"><div class="prob-bar" style="width:${p*100}%"></div></div>
        <div class="prob-val">${pct}%</div>
      </div>`;
    }).join('') + '</div>';
    const strip = document.getElementById('t2-product-strip');
    if (strip) strip.innerHTML = cfg.probs.map((p,i) => `<div class="t2-outcome-chip${p>0.01?' hot':''}">${labels[i]} ${(p*100).toFixed(0)}%</div>`).join('');
    const fEl = document.getElementById('t2-product-formula');
    if (fEl) { fEl.innerHTML = `<div>${cfg.formula}</div><div style="font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:8px;letter-spacing:0.05em">${cfg.note}</div>`; }
  }

  function sampleCounts(cfg, shots) {
    const counts = [0,0,0,0];
    for (let i = 0; i < shots; i++) {
      const r = Math.random();
      let acc = 0;
      for (let k = 0; k < 4; k++) {
        acc += cfg.probs[k];
        if (r <= acc + 1e-9) { counts[k]++; break; }
      }
    }
    return counts;
  }

  document.querySelectorAll('.t2-product-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.t2-product-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      current = btn.dataset.config;
      seen.add(current);
      renderProductProbs(configs[current]);
      if (seen.size >= 4) markDone('t2-1');
    });
  });

  const runBtn = document.getElementById('t2-product-run100');
  if (runBtn) runBtn.addEventListener('click', () => {
    const labels = ['|00⟩','|01⟩','|10⟩','|11⟩'];
    const counts = sampleCounts(configs[current], 100);
    const txt = counts.map((c,i) => `${labels[i]}:${c}`).join('  ·  ');
    const out = document.getElementById('t2-product-sample');
    if (out) out.textContent = `100-shot sample → ${txt}`;
  });

  renderProductProbs(configs['h0']);
})();

/* ---- Shared density matrix 2×2 renderer ---- */
function render2x2DM(containerId, rho00, rho01re, rho01im, rho11, opts) {
  // rho = [[rho00, rho01], [conj(rho01), rho11]]
  // opts: { colorClass: 'superpos'|'mixture'|'' }
  const el = document.getElementById(containerId);
  if (!el) return;
  const cls = (opts && opts.colorClass) || '';
  const offAmt = Math.sqrt(rho01re*rho01re + rho01im*rho01im);
  const offZero = offAmt < 0.02;
  const offStr = rho01im === 0
    ? rho01re.toFixed(3)
    : (rho01re.toFixed(2) + (rho01im >= 0 ? '+' : '') + rho01im.toFixed(2) + 'i');
  const conjStr = rho01im === 0
    ? rho01re.toFixed(3)
    : (rho01re.toFixed(2) + (rho01im >= 0 ? '−' : '+') + Math.abs(rho01im).toFixed(2) + 'i');

  const diagBg0 = `rgba(127,255,196,${0.05 + rho00 * 0.35})`;
  const diagBg1 = `rgba(127,255,196,${0.05 + rho11 * 0.35})`;
  const offBg   = offZero ? 'var(--bg-2)' : `rgba(111,212,224,${0.08 + offAmt * 0.4})`;

  el.innerHTML = `<div class="dm-2x2">
    <div class="dm-2x2-corner"></div>
    <div class="dm-2x2-head">⟨0|</div>
    <div class="dm-2x2-head">⟨1|</div>
    <div class="dm-2x2-row-head">|0⟩</div>
    <div class="dm-2x2-cell diag" style="background:${diagBg0}">
      <div class="cell-main">${rho00.toFixed(3)}</div>
      <div class="cell-sub">population</div>
    </div>
    <div class="dm-2x2-cell offdiag${offZero?' zero-ish':''}" style="background:${offBg}">
      <div class="cell-main">${offStr}</div>
      <div class="cell-sub">coherence</div>
    </div>
    <div class="dm-2x2-row-head">|1⟩</div>
    <div class="dm-2x2-cell offdiag${offZero?' zero-ish':''}" style="background:${offBg}">
      <div class="cell-main">${conjStr}</div>
      <div class="cell-sub">coherence*</div>
    </div>
    <div class="dm-2x2-cell diag" style="background:${diagBg1}">
      <div class="cell-main">${rho11.toFixed(3)}</div>
      <div class="cell-sub">population</div>
    </div>
  </div>`;
}

/* ---- T3 Step 1: hidden same-probabilities challenge ---- */
(function initT3Step1() {
  let basis = 'Z';
  let mapping = Math.random() < 0.5 ? { A: 'super', B: 'mix' } : { A: 'mix', B: 'super' };
  const ran = new Set();
  const guesses = { one: null };

  function probsFor(kind) {
    const n = 200;
    if (basis === 'Z') {
      const ones = Math.round(n * (0.46 + Math.random()*0.08));
      return [(n-ones)/n, ones/n];
    }
    if (kind === 'super') {
      const noise = Math.round(Math.random()*4);
      return [(n-noise)/n, noise/n];
    }
    const ones = Math.round(n * (0.46 + Math.random()*0.08));
    return [(n-ones)/n, ones/n];
  }

  function run(label) {
    const [p0,p1] = probsFor(mapping[label]);
    renderHist('hidden-hist-' + label.toLowerCase(), p0, p1, label === 'A' ? 'superpos' : 'mixture');
    ran.add(label + '-' + basis);
  }

  function resetRound() {
    mapping = Math.random() < 0.5 ? { A: 'super', B: 'mix' } : { A: 'mix', B: 'super' };
    ran.clear();
    guesses.one = null;
    renderHist('hidden-hist-a', 0, 0, 'neutral');
    renderHist('hidden-hist-b', 0, 0, 'neutral');
    const fb = document.getElementById('hidden-feedback');
    if (fb) fb.textContent = 'New round loaded. Run A and B in Z and X, then guess the superposition.';
  }

  document.querySelectorAll('[data-hidden-basis]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-hidden-basis]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      basis = btn.dataset.hiddenBasis;
      renderHist('hidden-hist-a', 0, 0, 'neutral');
      renderHist('hidden-hist-b', 0, 0, 'neutral');
    });
  });

  document.getElementById('hidden-run-a').addEventListener('click', () => run('A'));
  document.getElementById('hidden-run-b').addEventListener('click', () => run('B'));
  document.getElementById('hidden-new-round').addEventListener('click', resetRound);

  document.querySelectorAll('[data-hidden-guess]').forEach(btn => {
    btn.addEventListener('click', () => {
      const fb = document.getElementById('hidden-feedback');
      if (!(ran.has('A-X') && ran.has('B-X'))) {
        if (fb) fb.textContent = 'Run both hidden states in X basis first. Z basis alone cannot distinguish them.';
        return;
      }
      const guess = btn.dataset.hiddenGuess;
      const correct = mapping[guess] === 'super';
      if (fb) fb.innerHTML = correct
        ? '<b style="color:var(--phos)">Correct.</b> X-basis exposes coherence, so the superposition stands out.'
        : '<b style="color:var(--red)">Not quite.</b> In X-basis, the superposition should look near-deterministic while the mixture stays near 50/50.';
      if (correct) markDone('t3-1');
    });
  });

  resetRound();
})();

/* ---- T3 Step 2: decoherence slider on live 2×2 ρ ---- */
(function initT3Step2() {
  const slider = document.getElementById('t3-decohere-slider');
  const valEl  = document.getElementById('t3-decohere-val');
  let crossedThreshold = false, crossedFull = false;

  function update() {
    const t = parseInt(slider.value) / 100;   // 0 = pure |+>, 1 = mixture
    valEl.textContent = Math.round(t*100) + '%';

    // Interpolate: pure |+> has rho=[[0.5,0.5],[0.5,0.5]]
    //              mixture has rho=[[0.5,0],[0,0.5]]
    const offdiag = 0.5 * (1 - t);
    render2x2DM('t3-dm-live', 0.5, offdiag, 0, 0.5);

    // Purity = Tr(rho^2) = rho00^2 + rho11^2 + 2*|rho01|^2
    const purity = 0.5*0.5 + 0.5*0.5 + 2*offdiag*offdiag;

    const purEl = document.getElementById('t3-dm-purity');
    if (purEl) purEl.textContent = `Tr(ρ) = 1.000  ·  Tr(ρ²) = ${purity.toFixed(3)}  ·  ${purity > 0.99 ? 'pure state' : purity < 0.51 ? 'maximally mixed' : 'partially mixed'}`;

    const expEl = document.getElementById('t3-dm-explain');
    if (expEl) {
      const diagNote = 'Diagonal entries (0.500, 0.500) = populations. Measuring in Z-basis gives 50% |0⟩, 50% |1⟩. These never change as decoherence increases.';
      const offNote = offdiag > 0.45
        ? 'Off-diagonals ≈ 0.500 — full coherence. X-basis measurement always gives |0⟩. This is the quantum superposition signature.'
        : offdiag > 0.1
          ? `Off-diagonals ≈ ${offdiag.toFixed(3)} — partially decohered. X-basis now shows some randomness.`
          : 'Off-diagonals ≈ 0 — no coherence left. Indistinguishable from a classical coin flip in any measurement basis.';
      expEl.innerHTML = `<b style="color:var(--phos)">Populations unchanged.</b><br>${diagNote}<br><br><b style="color:var(--cyan)">Coherences ${offdiag > 0.45 ? 'intact' : offdiag < 0.05 ? 'gone' : 'decaying'}.</b><br>${offNote}`;
    }

    if (t >= 0.3) crossedThreshold = true;
    if (t >= 0.99) crossedFull = true;
    if (crossedThreshold && crossedFull) markDone('t3-2');
  }

  slider.addEventListener('input', update);
  update();
})();

  });

  document.getElementById('coherence-z-run').addEventListener('click', () => {
    const s = states[cur];
    const jitter = () => (Math.random()-0.5)*0.04;
    renderHist('coherence-z-hist', Math.min(1,Math.max(0,s.z0+jitter())), Math.min(1,Math.max(0,s.z1+jitter())), 'neutral');
    seenBases.add(cur + '-Z');
    if (seenBases.size >= 6) markDone('t3-3');
  });

  document.getElementById('coherence-x-run').addEventListener('click', () => {
    const s = states[cur];
    const jitter = () => (Math.random()-0.5)*0.04;
    renderHist('coherence-x-hist', Math.min(1,Math.max(0,s.x0+jitter())), Math.min(1,Math.max(0,s.x1+jitter())), 'neutral');
    seenBases.add(cur + '-X');
    if (seenBases.size >= 6) markDone('t3-3');
  });

  updateCoherence('pure_plus');
})();

/* ---- T3 Step 4: Bloch ball ---- */
(function initT3Step4() {
  const slider = document.getElementById('bloch-ball-slider');
  const valEl  = document.getElementById('bloch-ball-decohere-val');
  let reachedFull = false;

  function drawBlochBall(t) {
    // t=0: pure |+> on equator surface; t=1: centre (maximally mixed)
    // Bloch vector for |+>: (1,0,0). Scale by (1-t).
    const bx = (1 - t), by = 0, bz = 0;
    const blochLen = 1 - t;
    const purity = 0.5 + 0.5 * blochLen * blochLen;   // Tr(rho^2) = (1+r^2)/2

    const W = 280, H = 280, R = 110, cx = W/2, cy = H/2;
    // Simple orthographic with slight perspective tilt
    const camX = -0.2, camY = 0.4;

    function proj(x, y, z) {
      let y1 = y*Math.cos(camX) - z*Math.sin(camX);
      let z1 = y*Math.sin(camX) + z*Math.cos(camX);
      let x2 = x*Math.cos(camY) + z1*Math.sin(camY);
      let z2 = -x*Math.sin(camY) + z1*Math.cos(camY);
      let y2 = y1;
      return { sx: x2, sy: -y2, depth: z2 };
    }

    // Equator and meridian paths
    const nPts = 64;
    function circlePts(fn) {
      return Array.from({length: nPts+1}, (_,i) => {
        const a = (i/nPts)*2*Math.PI;
        return proj(...fn(a));
      });
    }
    const eq  = circlePts(a => [Math.cos(a), Math.sin(a), 0]);
    const mer = circlePts(a => [Math.sin(a), 0, Math.cos(a)]);

    function pathFor(pts, front) {
      let segs = [], cur = [];
      pts.forEach(p => {
        if ((p.depth >= 0) === front) { cur.push(p); }
        else { if (cur.length) segs.push(cur); cur = []; }
      });
      if (cur.length) segs.push(cur);
      return segs.map(s => 'M ' + s.map(p => `${cx+p.sx*R} ${cy+p.sy*R}`).join(' L ')).join(' ');
    }

    // Project the Bloch vector endpoint
    const vp = proj(bx, by, bz);
    const vsx = cx + vp.sx*R, vsy = cy + vp.sy*R;

    // Color the vector: amber at surface, fade to red at centre
    const alpha = 0.4 + (1-t)*0.6;

    const svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="var(--bg-0)" stroke="var(--line)" stroke-width="1"/>
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#bb-glow)" opacity="0.3"/>
      <defs>
        <radialGradient id="bb-glow" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="rgba(127,255,196,0.1)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
      </defs>
      <path d="${pathFor(eq,false)}" stroke="var(--line-bright)" stroke-width="1" fill="none" stroke-dasharray="2 3" opacity="0.5"/>
      <path d="${pathFor(mer,false)}" stroke="var(--line-bright)" stroke-width="1" fill="none" stroke-dasharray="2 3" opacity="0.5"/>
      <path d="${pathFor(eq,true)}" stroke="var(--line-bright)" stroke-width="1" fill="none"/>
      <path d="${pathFor(mer,true)}" stroke="var(--line-bright)" stroke-width="1" fill="none"/>
      <!-- pole labels -->
      <text x="${cx}" y="${cy-R-8}" fill="var(--phos)" font-family="var(--mono)" font-size="11" text-anchor="middle">|0⟩</text>
      <text x="${cx}" y="${cy+R+16}" fill="var(--phos)" font-family="var(--mono)" font-size="11" text-anchor="middle">|1⟩</text>
      <!-- Bloch vector -->
      <line x1="${cx}" y1="${cy}" x2="${vsx}" y2="${vsy}"
            stroke="var(--amber)" stroke-width="${2.5*(0.3+0.7*(1-t))}" stroke-linecap="round" opacity="${alpha}"/>
      <!-- vector endpoint: circle size shrinks with purity -->
      <circle cx="${vsx}" cy="${vsy}" r="${3 + blochLen*6}" fill="var(--amber)" opacity="${alpha}"/>
      ${blochLen < 0.05 ? `<circle cx="${cx}" cy="${cy}" r="5" fill="var(--red)" opacity="0.9"/>
        <text x="${cx+8}" y="${cy-6}" fill="var(--red)" font-family="var(--mono)" font-size="10">centre</text>` : ''}
      <circle cx="${cx}" cy="${cy}" r="2" fill="var(--ink-faint)"/>
    </svg>`;

    const host = document.getElementById('bloch-ball-svg');
    if (host) host.innerHTML = svg;

    const readEl = document.getElementById('bloch-ball-readout');
    if (readEl) readEl.innerHTML = `
      <div><span style="color:var(--ink-faint)">Bloch vector r = </span><span style="color:var(--amber)">${blochLen.toFixed(3)}</span></div>
      <div><span style="color:var(--ink-faint)">Tr(ρ²) = </span><span style="color:var(--phos)">${purity.toFixed(3)}</span></div>
      <div><span style="color:var(--ink-faint)">State type: </span>${blochLen > 0.98 ? '<span style="color:var(--phos)">pure (surface)</span>' : blochLen < 0.02 ? '<span style="color:var(--red)">maximally mixed (centre)</span>' : '<span style="color:var(--amber)">mixed (interior)</span>'}</div>
      <div style="margin-top:8px;font-size:10px;color:var(--ink-faint)">T₂ decay moves the vector from surface → centre</div>`;
  }

  slider.addEventListener('input', () => {
    const t = parseInt(slider.value)/100;
    valEl.textContent = Math.round(t*100) + '%';
    drawBlochBall(t);
    if (t >= 0.99) { reachedFull = true; markDone('t3-4'); }
  });

  // T3-5 auto-done on unlock
  const card5 = document.querySelector('[data-step="t3-5"]');
  if (card5) {
    const obs = new MutationObserver(() => {
      if (!card5.classList.contains('locked')) { markDone('t3-5'); obs.disconnect(); }
    });
    obs.observe(card5, { attributes: true, attributeFilter: ['class'] });
  }

  drawBlochBall(0);
})();


updateProgressPills();
</script>
</body>
</html>
