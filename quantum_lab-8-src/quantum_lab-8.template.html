<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quantum Lab — A Visual Circuit Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0e0c;
    --bg-1: #101613;
    --bg-2: #161e1a;
    --bg-3: #1e2822;
    --line: #243028;
    --line-bright: #365044;
    --ink: #d4e4db;
    --ink-dim: #8aa096;
    --ink-faint: #5a6e65;
    --phos: #7fffc4;        /* phosphor green */
    --phos-dim: #4fb890;
    --amber: #ffb865;
    --amber-dim: #c88740;
    --cyan: #6fd4e0;
    --magenta: #e67fb8;
    --red: #ff7070;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-0);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* subtle CRT-scan background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(127,255,196,0.04), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(255,184,101,0.03), transparent 50%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.008) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 28px 60px;
  }

  /* ---------------- HEADER ---------------- */
  header.masthead {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
    margin-bottom: 28px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .brand-mark {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: 34px;
    letter-spacing: -0.02em;
    color: var(--phos);
    line-height: 1;
  }
  .brand-mark .amp {
    color: var(--amber);
    font-weight: 300;
  }

  .brand-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding-bottom: 4px;
  }

  .meta-stack {
    text-align: right;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    line-height: 1.7;
  }
  .meta-stack span.live {
    color: var(--phos);
  }
  .meta-stack span.live::before {
    content: '●';
    margin-right: 4px;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ---------------- INTRO ---------------- */
  .intro {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 48px;
    margin-bottom: 36px;
    align-items: start;
  }
  .intro h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 46px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .intro h1 em {
    font-style: italic;
    color: var(--phos-dim);
  }
  .intro p {
    color: var(--ink-dim);
    font-size: 15px;
    line-height: 1.6;
    max-width: 58ch;
  }
  .intro .rules {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    line-height: 1.8;
    border-left: 1px solid var(--line-bright);
    padding-left: 16px;
  }
  .intro .rules b {
    color: var(--amber);
    font-weight: 500;
  }

  /* ---------------- LAYOUT ---------------- */
  .lab {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }

  /* ---------------- GATE PALETTE ---------------- */
  .palette {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 18px 16px;
    height: fit-content;
    position: sticky;
    top: 12px;
  }
  .palette h3 {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .gate-group { margin-bottom: 18px; }
  .gate-group:last-child { margin-bottom: 0; }
  .gate-group-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--phos-dim);
    margin-bottom: 8px;
  }
  .gate-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .gate-btn {
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--serif);
    font-weight: 500;
    font-size: 18px;
    padding: 10px 0;
    cursor: grab;
    user-select: none;
    text-align: center;
    transition: all 0.15s ease;
    position: relative;
  }
  .gate-btn:hover {
    border-color: var(--phos);
    color: var(--phos);
    transform: translateY(-1px);
    box-shadow: 0 0 12px rgba(127,255,196,0.2);
  }
  .gate-btn.dragging {
    opacity: 0.4;
  }
  .gate-btn .tip {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    display: block;
    font-weight: 400;
    margin-top: 2px;
  }
  .gate-btn:hover .tip { color: var(--phos-dim); }

  .gate-btn.ctrl { font-family: var(--mono); font-size: 12px; }
  .gate-btn.meas { font-family: var(--mono); font-size: 13px; color: var(--amber); }
  .gate-btn.meas:hover { color: var(--amber); border-color: var(--amber); box-shadow: 0 0 12px rgba(255,184,101,0.2); }

  .qubit-ctrl {
    display: flex;
    gap: 6px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
  }
  .qubit-ctrl button {
    flex: 1;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    font-family: var(--mono);
    font-size: 14px;
    padding: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .qubit-ctrl button:hover:not(:disabled) {
    border-color: var(--phos-dim);
    color: var(--phos);
  }
  .qubit-ctrl button:disabled { opacity: 0.3; cursor: not-allowed; }
  .qubit-ctrl .label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    align-self: center;
    margin-right: 4px;
  }

  /* ---------------- CIRCUIT CANVAS ---------------- */
  .canvas-wrap {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 22px;
    position: relative;
  }
  .canvas-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .canvas-head h2 {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: 20px;
    color: var(--ink);
  }
  .canvas-head .btns { display: flex; gap: 8px; }
  .btn {
    background: transparent;
    border: 1px solid var(--line-bright);
    color: var(--ink-dim);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover {
    border-color: var(--phos);
    color: var(--phos);
  }
  .btn.primary {
    background: var(--phos);
    color: var(--bg-0);
    border-color: var(--phos);
    font-weight: 700;
  }
  .btn.primary:hover {
    background: var(--phos-dim);
    border-color: var(--phos-dim);
    color: var(--bg-0);
    box-shadow: 0 0 16px rgba(127,255,196,0.4);
  }

  .circuit {
    position: relative;
    overflow-x: auto;
    padding: 8px 0;
  }

  .wires { position: relative; }
  .wire-row {
    display: flex;
    align-items: center;
    position: relative;
    height: 58px;
  }
  .wire-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dim);
    width: 56px;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }
  .wire-label .state {
    color: var(--phos-dim);
    font-size: 10px;
  }
  .wire-track {
    position: relative;
    flex: 1;
    min-width: 600px;
    height: 58px;
    display: flex;
    align-items: center;
  }
  .wire-line {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 1px;
    background: linear-gradient(90deg, var(--line-bright) 0%, var(--line-bright) 100%);
    transform: translateY(-50%);
  }

  .slots {
    display: flex;
    position: relative;
    width: 100%;
    gap: 0;
  }
  .slot {
    flex: 0 0 64px;
    height: 58px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .slot.drop-target {
    background: radial-gradient(circle at center, rgba(127,255,196,0.12) 0%, transparent 70%);
  }
  .slot.drop-target::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px dashed var(--phos);
    border-radius: 2px;
  }

  .placed {
    width: 40px;
    height: 40px;
    background: var(--bg-2);
    border: 1px solid var(--phos);
    color: var(--phos);
    font-family: var(--serif);
    font-weight: 500;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    box-shadow: 0 0 0 3px var(--bg-1), 0 0 16px rgba(127,255,196,0.15);
  }
  .placed:hover {
    background: var(--bg-3);
    box-shadow: 0 0 0 3px var(--bg-1), 0 0 20px rgba(127,255,196,0.4);
  }
  .placed.ctrl-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--phos);
    border: none;
  }
  .placed.target-x {
    border-radius: 50%;
    background: var(--bg-1);
    font-size: 22px;
    font-weight: 300;
  }
  .placed.meas {
    border-color: var(--amber);
    color: var(--amber);
    font-family: var(--mono);
    font-size: 12px;
    box-shadow: 0 0 0 3px var(--bg-1), 0 0 16px rgba(255,184,101,0.2);
  }
  .placed.meas:hover {
    box-shadow: 0 0 0 3px var(--bg-1), 0 0 20px rgba(255,184,101,0.4);
  }
  .placed .x-btn {
    position: absolute;
    top: -7px;
    right: -7px;
    width: 14px;
    height: 14px;
    background: var(--bg-0);
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 50%;
    font-size: 9px;
    font-family: var(--sans);
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    line-height: 1;
    padding: 0;
  }
  .placed:hover .x-btn { display: flex; }

  .ctrl-link {
    position: absolute;
    width: 1.5px;
    background: var(--phos);
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
    pointer-events: none;
    box-shadow: 0 0 8px rgba(127,255,196,0.3);
  }

  .empty-hint {
    padding: 50px 0;
    text-align: center;
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-faint);
    font-size: 16px;
  }
  .empty-hint .mono {
    font-family: var(--mono);
    font-style: normal;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--phos-dim);
    margin-top: 8px;
    display: block;
  }

  /* ---------------- OUTPUT PANEL ---------------- */
  .output {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 24px;
  }
  .panel {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 22px;
    min-height: 220px;
  }
  .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .panel-head h3 {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: 18px;
    color: var(--ink);
  }
  .panel-head .num {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
  }

  /* Probability bars */
  .prob-list { display: flex; flex-direction: column; gap: 8px; }
  .prob-row {
    display: grid;
    grid-template-columns: 80px 1fr 60px;
    gap: 12px;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
  }
  .prob-label {
    color: var(--ink);
  }
  .prob-bar-wrap {
    background: var(--bg-2);
    height: 18px;
    position: relative;
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .prob-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--phos-dim), var(--phos));
    position: relative;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .prob-bar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, transparent 0 3px, rgba(0,0,0,0.15) 3px 4px);
  }
  .prob-val {
    color: var(--phos);
    text-align: right;
    font-weight: 500;
  }
  .prob-row.zero .prob-label { color: var(--ink-faint); }
  .prob-row.zero .prob-val { color: var(--ink-faint); }
  .prob-row.zero .prob-bar { background: var(--line); }

  /* Narrative */
  .narrative {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink);
  }
  .narrative p { margin-bottom: 14px; }
  .narrative p:last-child { margin-bottom: 0; }
  .narrative .step {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--phos-dim);
    margin-right: 8px;
  }
  .narrative code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg-2);
    padding: 1px 6px;
    color: var(--amber);
    border-radius: 2px;
  }
  .narrative .punch {
    color: var(--phos);
    font-style: italic;
  }

  .placeholder-output {
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-faint);
    font-size: 14px;
    padding: 32px 0;
    text-align: center;
  }

  /* ---------------- EXAMPLES ---------------- */
  .examples {
    margin-top: 48px;
    padding-top: 36px;
    border-top: 1px solid var(--line);
  }
  .examples-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
  }
  .examples-head h2 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 32px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .examples-head h2 em {
    font-style: italic;
    color: var(--phos-dim);
  }
  .examples-head .sub {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .ex-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .ex-card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    padding: 22px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .ex-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent, var(--phos));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }
  .ex-card:hover {
    border-color: var(--line-bright);
    transform: translateY(-2px);
  }
  .ex-card:hover::before { transform: scaleX(1); }

  .ex-num {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .ex-title {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.15;
  }
  .ex-subtitle {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent, var(--phos-dim));
    margin-bottom: 14px;
  }
  .ex-desc {
    color: var(--ink-dim);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 18px;
  }
  .ex-load {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent, var(--phos));
    border-top: 1px dashed var(--line);
    padding-top: 12px;
    display: flex;
    justify-content: space-between;
  }
  .ex-load .arrow { transition: transform 0.2s; }
  .ex-card:hover .ex-load .arrow { transform: translateX(4px); }

  .ex-card.c1 { --accent: var(--phos); }
  .ex-card.c2 { --accent: var(--cyan); }
  .ex-card.c3 { --accent: var(--magenta); }
  .ex-card.c4 { --accent: var(--amber); }

  .ex-card.c2 .ex-title, .ex-card.c3 .ex-title, .ex-card.c4 .ex-title { color: var(--ink); }

  /* Noise control */
  .noise-ctrl {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 2px;
  }
  .noise-ctrl .noise-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .noise-ctrl input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 90px;
    height: 3px;
    background: var(--line-bright);
    outline: none;
    cursor: pointer;
  }
  .noise-ctrl input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    background: var(--amber);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,184,101,0.5);
    transition: transform 0.15s;
  }
  .noise-ctrl input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .noise-ctrl input[type="range"]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    background: var(--amber);
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px rgba(255,184,101,0.5);
  }
  .noise-ctrl .noise-val {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    min-width: 48px;
    letter-spacing: 0.05em;
  }
  .noise-ctrl.off .noise-val { color: var(--ink-faint); }
  .noise-ctrl.off input[type="range"]::-webkit-slider-thumb {
    background: var(--ink-faint);
    box-shadow: none;
  }

  .ex-grid.four { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 1100px) { .ex-grid.four { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .ex-grid.four { grid-template-columns: 1fr; } }

  /* Noise explainer aside */
  .noise-aside {
    margin-top: 36px;
    padding: 24px 28px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-left: 2px solid var(--amber);
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 32px;
    align-items: start;
    position: relative;
  }
  .noise-aside .tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber-dim);
  }
  .noise-aside .tag::before {
    content: '◐';
    display: inline-block;
    color: var(--amber);
    margin-right: 8px;
    font-size: 11px;
  }
  .noise-aside h3 {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-top: 6px;
    margin-bottom: 0;
  }
  .noise-aside h3 em {
    color: var(--amber);
    font-style: normal;
    font-weight: 400;
  }
  .noise-aside p {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .noise-aside p:last-child { margin-bottom: 0; }
  .noise-aside p .punch-amber {
    color: var(--amber);
    font-style: italic;
  }
  .noise-aside code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg-2);
    padding: 1px 6px;
    color: var(--amber);
    border-radius: 2px;
  }
  @media (max-width: 700px) {
    .noise-aside { grid-template-columns: 1fr; gap: 14px; padding: 22px; }
  }

  /* Reference / footer */
  .reference {
    margin-top: 52px;
    padding-top: 32px;
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
  }
  .reference h3 {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--phos-dim);
    margin-bottom: 14px;
  }
  .gloss-list dt {
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
    color: var(--ink);
    margin-top: 10px;
  }
  .gloss-list dt:first-child { margin-top: 0; }
  .gloss-list dd {
    color: var(--ink-dim);
    font-size: 13px;
    margin-top: 2px;
    line-height: 1.55;
  }

  footer.colophon {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* mobile */
  @media (max-width: 900px) {
    .intro, .lab, .output, .ex-grid, .reference {
      grid-template-columns: 1fr;
    }
    .palette { position: static; }
    .intro h1 { font-size: 32px; }
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg-2);
    border: 1px solid var(--phos);
    color: var(--phos);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 10px 18px;
    z-index: 100;
    transition: transform 0.3s;
    box-shadow: 0 0 20px rgba(127,255,196,0.25);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.err { border-color: var(--red); color: var(--red); box-shadow: 0 0 20px rgba(255,112,112,0.25); }

  /* =========================================================
     TAB NAV (top-level: Lab vs Learn)
     ========================================================= */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--line);
  }
  .tab-btn {
    background: transparent;
    border: none;
    padding: 16px 24px 14px;
    cursor: pointer;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: relative;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab-btn:hover { background: rgba(127,255,196,0.03); }
  .tab-btn.active { border-bottom-color: var(--phos); }
  .tab-btn .tab-num {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .tab-btn.active .tab-num { color: var(--phos); }
  .tab-btn .tab-name {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: 22px;
    color: var(--ink-dim);
    line-height: 1.1;
  }
  .tab-btn.active .tab-name { color: var(--ink); }
  .tab-btn .tab-sub {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .view { display: none; }
  .view.active { display: block; }

  /* =========================================================
     LEARN INTRO
     ========================================================= */
  .learn-intro {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 48px;
    margin-bottom: 28px;
    align-items: start;
  }
  .learn-intro h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 46px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .learn-intro h1 em {
    font-style: italic;
    color: var(--phos-dim);
  }
  .learn-intro p {
    color: var(--ink-dim);
    font-size: 15px;
    line-height: 1.6;
    max-width: 58ch;
  }
  .learn-intro .rules {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    line-height: 1.8;
    border-left: 1px solid var(--line-bright);
    padding-left: 16px;
  }
  .learn-intro .rules b {
    color: var(--amber);
    font-weight: 500;
  }

  /* =========================================================
     SUBTABS (Tutorial 1 vs Tutorial 2)
     ========================================================= */
  .subtabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .subtab {
    background: var(--bg-1);
    border: 1px solid var(--line);
    padding: 18px 22px;
    cursor: pointer;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 3px;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .subtab::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--phos);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s;
  }
  .subtab.active::after { transform: scaleX(1); }
  .subtab:hover:not(.active) { border-color: var(--line-bright); }
  .subtab.active { background: var(--bg-2); }
  .subtab-num {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--phos-dim);
    text-transform: uppercase;
  }
  .subtab-name {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: 19px;
    color: var(--ink);
    line-height: 1.15;
  }
  .subtab-pill {
    position: absolute;
    top: 14px;
    right: 18px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    padding: 2px 8px;
    border: 1px solid var(--line);
    background: var(--bg-0);
  }
  .subtab.active .subtab-pill { color: var(--phos); border-color: var(--phos-dim); }

  /* =========================================================
     STEP CARDS
     ========================================================= */
  .tutorial {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .step-card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 28px 32px;
    transition: opacity 0.3s, filter 0.3s;
    position: relative;
  }
  .step-card.locked {
    opacity: 0.35;
    filter: saturate(0.3);
    pointer-events: none;
  }
  .step-card.locked::after {
    content: '🔒  Complete the step above to unlock';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--phos);
    background: var(--bg-0);
    padding: 8px 18px;
    border: 1px solid var(--phos-dim);
    text-transform: uppercase;
    pointer-events: none;
  }
  .step-card.done .step-num::after {
    content: ' · done';
    color: var(--phos);
  }
  .step-head {
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .step-num {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--phos-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .step-head h2 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 28px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .step-body p {
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: 14px;
    max-width: 72ch;
  }
  .step-body p b {
    font-weight: 500;
    color: var(--phos);
    font-style: normal;
  }
  .step-body p em {
    color: var(--amber);
    font-style: italic;
  }
  .step-body p .punch {
    color: var(--phos);
    font-style: italic;
  }
  .step-body code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--bg-2);
    padding: 1px 7px;
    color: var(--amber);
    border-radius: 2px;
  }

  .step-action {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px dashed var(--line);
    gap: 16px;
    flex-wrap: wrap;
  }
  .action-prompt {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .step-card.done .action-prompt {
    color: var(--phos-dim);
  }
  .step-card.done .action-prompt::before {
    content: '✓ ';
    color: var(--phos);
  }
  .step-next:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    background: var(--bg-2);
    color: var(--ink-faint);
    border-color: var(--line);
  }
  .step-next:disabled:hover { box-shadow: none; }

  /* =========================================================
     CLASSICAL BIT SWITCH
     ========================================================= */
  .classical-bit {
    display: flex;
    align-items: center;
    gap: 24px;
    margin: 24px 0;
    padding: 24px;
    background: var(--bg-2);
    border: 1px solid var(--line);
  }
  .bit-switch {
    width: 90px;
    height: 90px;
    background: var(--bg-0);
    border: 1.5px solid var(--line-bright);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .bit-switch:hover { border-color: var(--phos); }
  .bit-glow {
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(127,255,196,0) 0%, rgba(127,255,196,0) 100%);
    transition: background 0.3s;
  }
  .bit-switch.on .bit-glow {
    background: radial-gradient(circle, rgba(127,255,196,0.5) 0%, rgba(127,255,196,0) 70%);
  }
  .bit-switch.on { border-color: var(--phos); box-shadow: 0 0 20px rgba(127,255,196,0.25); }
  .bit-value {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 48px;
    color: var(--ink-dim);
    position: relative;
    z-index: 1;
    line-height: 1;
  }
  .bit-switch.on .bit-value { color: var(--phos); }
  .bit-hint {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  /* =========================================================
     BLOCH SPHERE
     ========================================================= */
  .bloch-wrap {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 28px;
    margin: 20px 0 8px;
    padding: 24px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    align-items: start;
  }
  .bloch-host {
    width: 100%;
    aspect-ratio: 1;
    max-width: 340px;
    position: relative;
    cursor: grab;
    user-select: none;
  }
  .bloch-host:active { cursor: grabbing; }
  .bloch-host svg { width: 100%; height: 100%; display: block; }
  .bloch-side {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .bloch-readout {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.8;
    color: var(--ink-dim);
    padding: 14px 16px;
    background: var(--bg-0);
    border: 1px solid var(--line);
    min-height: 100px;
  }
  .bloch-readout .rlabel { color: var(--ink-faint); letter-spacing: 0.1em; font-size: 10px; text-transform: uppercase; }
  .bloch-readout .rval { color: var(--phos); font-weight: 500; }
  .bloch-readout .rmini { color: var(--amber); }

  .bloch-presets, .gate-apply {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .bloch-presets-label {
    width: 100%;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 2px;
  }
  .preset-btn, .apply-gate-btn, .reset-gate-btn {
    background: var(--bg-0);
    border: 1px solid var(--line-bright);
    color: var(--ink);
    font-family: var(--serif);
    font-size: 15px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 54px;
  }
  .preset-btn:hover, .apply-gate-btn:hover {
    border-color: var(--phos);
    color: var(--phos);
    box-shadow: 0 0 10px rgba(127,255,196,0.2);
  }
  .reset-gate-btn {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 14px;
    color: var(--ink-dim);
    width: 100%;
  }
  .reset-gate-btn:hover { border-color: var(--amber); color: var(--amber); }

  /* =========================================================
     MINI-RUNNER (pre-built circuit + result)
     ========================================================= */
  .mini-runner {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 22px;
    margin: 20px 0 8px;
    padding: 22px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    align-items: start;
  }
  .mini-circuit {
    background: var(--bg-0);
    border: 1px solid var(--line);
    padding: 18px 14px;
    min-height: 140px;
    position: relative;
  }
  .mini-result {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .mini-result-head {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 2px;
  }
  .mini-shot {
    font-family: var(--serif);
    font-size: 56px;
    color: var(--phos);
    text-align: center;
    padding: 12px 0;
    background: var(--bg-0);
    border: 1px solid var(--line);
    line-height: 1;
    font-weight: 300;
  }
  .mini-history {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    padding: 10px 14px;
    background: var(--bg-0);
    border: 1px solid var(--line);
    min-height: 38px;
    word-wrap: break-word;
  }
  .mini-history .h0 { color: var(--cyan); }
  .mini-history .h1 { color: var(--amber); }

  .mini-probs {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .mini-probs .prob-row {
    grid-template-columns: 70px 1fr 56px;
  }

  .pair-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .pair-cell {
    background: var(--bg-0);
    border: 1px solid var(--line);
    padding: 8px 4px;
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
  }
  .pair-cell.match { border-color: var(--phos-dim); color: var(--phos); }
  .pair-cell.mismatch { border-color: var(--red); color: var(--red); }
  .pair-cell.empty { color: var(--ink-faint); }

  .mini-run-btn { margin-top: 6px; }
  .mini-reset-btn { margin-top: 0; }

  /* mini-circuit rendering */
  .mini-wires .mini-wire-row {
    display: flex;
    align-items: center;
    height: 38px;
  }
  .mini-wires .mini-wire-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-dim);
    width: 40px;
    flex-shrink: 0;
  }
  .mini-wires .mini-track {
    flex: 1;
    position: relative;
    height: 38px;
    display: flex;
    align-items: center;
  }
  .mini-wires .mini-line {
    position: absolute; left: 0; right: 0; top: 50%;
    height: 1px; background: var(--line-bright);
    transform: translateY(-50%);
  }
  .mini-wires .mini-slots { display: flex; position: relative; width: 100%; z-index: 2; }
  .mini-wires .mini-slot {
    flex: 0 0 46px;
    height: 38px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .mini-gate {
    width: 28px; height: 28px;
    background: var(--bg-2);
    border: 1px solid var(--phos);
    color: var(--phos);
    font-family: var(--serif);
    font-weight: 500;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 2px var(--bg-0);
  }
  .mini-gate.ctrl-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--phos); border: none; }
  .mini-gate.target-x { border-radius: 50%; font-size: 16px; font-weight: 300; background: var(--bg-0); }
  .mini-gate.meas { border-color: var(--amber); color: var(--amber); font-family: var(--mono); font-size: 10px; }
  .mini-ctrl-link {
    position: absolute;
    width: 1.5px;
    background: var(--phos);
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 1;
  }

  /* =========================================================
     NOISE DEMO (slider + label)
     ========================================================= */
  .noise-demo {
    padding: 18px;
    background: var(--bg-0);
    border: 1px solid var(--line);
    border-left: 2px solid var(--amber);
  }
  .noise-demo-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    margin-bottom: 10px;
  }
  .noise-demo-label span {
    color: var(--amber);
    font-weight: 500;
  }
  .noise-demo-sublabel {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
    margin-top: 10px;
  }
  .t1-noise-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 3px;
    background: var(--line-bright);
    outline: none;
    cursor: pointer;
  }
  .t1-noise-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    background: var(--amber);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(255,184,101,0.5);
  }
  .t1-noise-slider::-moz-range-thumb {
    width: 14px; height: 14px; background: var(--amber); border-radius: 50%; border: none;
    box-shadow: 0 0 10px rgba(255,184,101,0.5);
  }

  /* =========================================================
     INSIGHT BOX (calm callout)
     ========================================================= */
  .insight-box {
    margin: 18px 0 6px;
    padding: 18px 22px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-left: 2px solid var(--phos);
  }
  .insight-box.amber { border-left-color: var(--amber); }
  .insight-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--phos-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .insight-box.amber .insight-label { color: var(--amber-dim); }
  .insight-text {
    font-family: var(--serif) !important;
    font-size: 15px !important;
    line-height: 1.6 !important;
    color: var(--ink) !important;
    margin: 0 !important;
  }

  /* =========================================================
     WRAP-UP CARDS
     ========================================================= */
  .wrap-up {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 18px;
  }
  .wrap-card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-left: 2px solid var(--phos);
    padding: 20px 22px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    color: inherit;
  }
  .wrap-card.alt { border-left-color: var(--amber); }
  .wrap-card:hover { background: var(--bg-3); transform: translateY(-1px); }
  .wrap-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--phos-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .wrap-card.alt .wrap-tag { color: var(--amber-dim); }
  .wrap-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .wrap-desc {
    color: var(--ink-dim);
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .wrap-cta {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--phos);
  }
  .wrap-card.alt .wrap-cta { color: var(--amber); }

  @media (max-width: 900px) {
    .learn-intro, .subtabs, .bloch-wrap, .mini-runner, .wrap-up { grid-template-columns: 1fr; }
    .bloch-host { max-width: 300px; margin: 0 auto; }
    .step-card { padding: 22px 20px; }
    .step-head h2 { font-size: 22px; }
  }

  /* =========================================================
     TEMPLATES VIEW
     ========================================================= */
  .templates-intro {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 48px;
    margin-bottom: 40px;
    align-items: start;
  }
  .templates-intro h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 46px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .templates-intro h1 em {
    font-style: italic;
    color: var(--phos-dim);
  }
  .templates-intro p {
    color: var(--ink-dim);
    font-size: 15px;
    line-height: 1.6;
    max-width: 58ch;
  }
  .templates-intro .rules {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    line-height: 1.8;
    border-left: 1px solid var(--line-bright);
    padding-left: 16px;
  }
  .templates-intro .rules b {
    color: var(--amber);
    font-weight: 500;
  }

  .tpl-section {
    margin-bottom: 52px;
  }
  .tpl-section-head {
    padding: 0 0 20px 0;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .tpl-section-head::before {
    content: '';
    position: absolute;
    left: 0;
    bottom: -1px;
    width: 80px;
    height: 2px;
    background: var(--cat-accent, var(--phos));
  }
  .tpl-section-num {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--cat-accent, var(--phos-dim));
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .tpl-section-head h2 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 32px;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .tpl-section-desc {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--ink-dim);
    line-height: 1.5;
    max-width: 72ch;
  }

  .cat-foundations { --cat-accent: var(--phos); --cat-accent-dim: var(--phos-dim); }
  .cat-entanglement { --cat-accent: var(--cyan); --cat-accent-dim: #4a9aa5; }
  .cat-algorithms { --cat-accent: var(--magenta); --cat-accent-dim: #a85a86; }
  .cat-noise { --cat-accent: var(--amber); --cat-accent-dim: var(--amber-dim); }

  .tpl-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 1100px) { .tpl-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 700px)  { .tpl-grid { grid-template-columns: 1fr; } }

  .tpl-card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    padding: 22px 24px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .tpl-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 2px;
    background: var(--cat-accent);
    transform: scaleY(0.3);
    transform-origin: top;
    transition: transform 0.25s ease;
  }
  .tpl-card:hover {
    background: var(--bg-2);
    border-color: var(--line-bright);
    transform: translateY(-2px);
  }
  .tpl-card:hover::before { transform: scaleY(1); }

  .tpl-card-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .tpl-id {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--cat-accent-dim);
    text-transform: uppercase;
  }
  .tpl-qubits {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
  }
  .tpl-card h3 {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: 22px;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 3px;
    letter-spacing: -0.01em;
  }
  .tpl-one-liner {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cat-accent);
    margin-bottom: 14px;
  }
  .tpl-desc {
    color: var(--ink-dim);
    font-size: 13.5px;
    line-height: 1.58;
    margin-bottom: 16px;
    flex: 1;
  }
  .tpl-desc code, .tpl-desc em {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg-2);
    padding: 1px 5px;
    color: var(--ink);
    border-radius: 2px;
    font-style: normal;
  }
  .tpl-desc em {
    background: transparent;
    padding: 0;
    color: var(--cat-accent);
    font-family: var(--serif);
    font-style: italic;
    font-size: 13.5px;
  }
  .tpl-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 16px;
  }
  .tpl-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 3px 8px;
    border: 1px solid var(--line);
    background: var(--bg-2);
  }
  .tpl-cta {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cat-accent);
    padding-top: 12px;
    border-top: 1px dashed var(--line);
    transition: letter-spacing 0.2s;
  }
  .tpl-card:hover .tpl-cta { letter-spacing: 0.2em; }

  /* Lab-specific noise aside placement */
  .lab-noise-aside {
    margin: 32px 0 0 0;
  }

  /* =========================================================
     OUTPUT VIEW TOGGLE (probabilities / amplitudes / density matrix)
     ========================================================= */
  .output-toggle {
    display: flex;
    gap: 0;
    background: var(--bg-2);
    border: 1px solid var(--line);
    padding: 2px;
  }
  .output-toggle button {
    background: transparent;
    border: none;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-dim);
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .output-toggle button:hover:not(.active) {
    color: var(--ink);
  }
  .output-toggle button.active {
    background: var(--bg-0);
    color: var(--phos);
    box-shadow: inset 0 0 0 1px var(--phos-dim);
  }

  /* Amplitude table */
  .amp-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 11.5px;
  }
  .amp-table thead th {
    text-align: left;
    padding: 8px 10px 8px 0;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    border-bottom: 1px solid var(--line);
    font-weight: 500;
  }
  .amp-table thead th.num { text-align: right; }
  .amp-table tbody td {
    padding: 5px 10px 5px 0;
    border-bottom: 1px dotted var(--line);
  }
  .amp-table tbody td.num { text-align: right; color: var(--ink); }
  .amp-table tbody td.num.zero { color: var(--ink-faint); }
  .amp-table tbody td.basis { color: var(--phos); }
  .amp-table tbody td.mag.big { color: var(--amber); font-weight: 500; }
  .amp-table tbody td.phase { color: var(--magenta); }
  .amp-table tbody tr.tiny td { opacity: 0.4; }
  .amp-table tbody tr.tiny td.basis { opacity: 0.55; }

  /* Density matrix */
  .dm-wrap {
    overflow-x: auto;
    max-width: 100%;
  }
  .dm-grid {
    display: grid;
    gap: 2px;
    background: var(--bg-0);
    padding: 10px;
    border: 1px solid var(--line);
    width: fit-content;
    margin: 0 auto;
  }
  .dm-header-row, .dm-row {
    display: contents;
  }
  .dm-col-head, .dm-row-head {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--ink-faint);
    padding: 3px 4px;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .dm-row-head { text-align: right; }
  .dm-cell {
    width: 28px;
    height: 28px;
    font-family: var(--mono);
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--ink);
    cursor: default;
    transition: transform 0.1s;
    position: relative;
  }
  .dm-cell:hover {
    transform: scale(1.4);
    z-index: 10;
    border-color: var(--phos);
    box-shadow: 0 0 10px rgba(127,255,196,0.3);
  }
  .dm-cell .cell-val {
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-0);
    border: 1px solid var(--phos);
    padding: 4px 8px;
    font-size: 10px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 20;
  }
  .dm-cell:hover .cell-val { opacity: 1; }

  .dm-legend {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }
  .dm-legend-bar {
    height: 10px;
    width: 180px;
    background: linear-gradient(90deg, var(--bg-2) 0%, var(--phos-dim) 50%, var(--phos) 100%);
    border: 1px solid var(--line);
  }

  .view-note {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--amber-dim);
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    padding: 6px 10px;
    background: rgba(255,184,101,0.06);
    border-left: 2px solid var(--amber-dim);
  }

  /* =========================================================
     TEMPLATE CONTEXT CARD
     ========================================================= */
  .ctx-card {
    margin: 16px 0 0 0;
    border: 1px solid var(--ctx-color, var(--phos));
    border-left-width: 3px;
    background: var(--bg-1);
    position: relative;
    animation: ctx-slide-in 0.25s ease;
  }
  @keyframes ctx-slide-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .ctx-card-inner {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 18px 48px 18px 22px;
  }
  .ctx-left { flex: 1; min-width: 0; }
  .ctx-eyebrow {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ctx-color, var(--phos));
    margin-bottom: 4px;
  }
  .ctx-title {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .ctx-why {
    font-family: var(--serif);
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-dim);
    margin: 0 0 10px 0;
    max-width: 90ch;
  }
  .ctx-why b { color: var(--ink); font-weight: 500; }
  .ctx-why em { color: var(--ctx-color, var(--phos)); font-style: italic; }
  .ctx-facts {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .ctx-fact {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--ctx-color, var(--phos));
    padding: 3px 10px;
    border: 1px solid var(--ctx-color, var(--phos));
    background: rgba(0,0,0,0.2);
    opacity: 0.85;
  }
  .ctx-dismiss {
    position: absolute;
    top: 12px;
    right: 14px;
    background: transparent;
    border: none;
    color: var(--ink-faint);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 4px;
    transition: color 0.15s;
    font-family: var(--sans);
    font-weight: 300;
  }
  .ctx-dismiss:hover { color: var(--ink); }
  /* =========================================================
     TUTORIAL 2 — Entanglement widgets
     ========================================================= */
  .cnot-explorer {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 20px;
    align-items: center;
    margin: 20px 0 8px;
    padding: 22px;
    background: var(--bg-2);
    border: 1px solid var(--line);
  }
  .cnot-inputs, .cnot-output { display: flex; flex-direction: column; gap: 10px; }
  .cnot-arrow { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; color: var(--phos-dim); text-align: center; white-space: nowrap; }
  .cnot-ctrl-btn, .t2-product-btn { background: var(--bg-0); border: 1px solid var(--line-bright); color: var(--ink-dim); font-family: var(--serif); font-size: 15px; padding: 8px 14px; cursor: pointer; transition: all 0.15s; min-width: 54px; }
  .cnot-ctrl-btn.active, .t2-product-btn.active { border-color: var(--phos); color: var(--phos); background: var(--bg-1); box-shadow: 0 0 8px rgba(127,255,196,0.15); }
  .cnot-ctrl-btn:hover:not(.active), .t2-product-btn:hover:not(.active) { border-color: var(--phos-dim); color: var(--ink); }
  .bell-builder { margin: 20px 0 8px; padding: 22px; background: var(--bg-2); border: 1px solid var(--line); }
  .bell-steps-nav { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); padding-bottom: 14px; flex-wrap: wrap; }
  .bell-step-btn { background: var(--bg-0); border: 1px solid var(--line); color: var(--ink-dim); font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 14px; cursor: pointer; transition: all 0.15s; }
  .bell-step-btn.active { border-color: var(--phos); color: var(--phos); background: var(--bg-1); }
  .bell-step-btn:hover:not(.active) { border-color: var(--line-bright); color: var(--ink); }
  .bell-display { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: start; }
  .bell-state-box, .bell-probs-box, .bell-desc-box { padding: 14px; background: var(--bg-0); border: 1px solid var(--line); min-height: 100px; }
  /* =========================================================
     TUTORIAL 3 — Density matrix / compare widgets
     ========================================================= */
  .two-states-compare { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: start; margin: 20px 0 8px; padding: 22px; background: var(--bg-2); border: 1px solid var(--line); }
  .compare-side { display: flex; flex-direction: column; gap: 10px; }
  .compare-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; padding: 4px 10px; display: inline-block; }
  .compare-label.superpos { color: var(--phos); border-left: 2px solid var(--phos); }
  .compare-label.mixture   { color: var(--amber); border-left: 2px solid var(--amber); }
  .compare-formula { font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--ink-dim); padding: 8px 10px; background: var(--bg-0); border: 1px solid var(--line); }
  .compare-basis-toggle { display: flex; gap: 4px; }
  .basis-btn { background: var(--bg-0); border: 1px solid var(--line); color: var(--ink-faint); font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 10px; cursor: pointer; transition: all 0.15s; flex: 1; }
  .basis-btn.active { background: var(--bg-2); color: var(--phos); border-color: var(--phos-dim); }
  .compare-hist { background: var(--bg-0); border: 1px solid var(--line); padding: 14px; min-height: 72px; }
  .compare-divider { font-family: var(--serif); font-style: italic; font-size: 22px; color: var(--ink-faint); align-self: center; text-align: center; }
  .hist-bar-row { display: grid; grid-template-columns: 30px 1fr 44px; gap: 8px; align-items: center; margin-bottom: 6px; font-family: var(--mono); font-size: 11px; }
  .hist-bar-row .h-label { color: var(--ink-dim); }
  .hist-bar-wrap { background: var(--bg-2); height: 16px; border: 1px solid var(--line); overflow: hidden; }
  .hist-bar { height: 100%; transition: width 0.4s ease; }
  .hist-bar.superpos { background: linear-gradient(90deg, var(--phos-dim), var(--phos)); }
  .hist-bar.mixture  { background: linear-gradient(90deg, var(--amber-dim), var(--amber)); }
  .hist-bar.neutral  { background: linear-gradient(90deg, var(--cyan), #5abbc8); }
  .hist-val { color: var(--phos); text-align: right; }
  .hist-val.amber { color: var(--amber); }
  .hist-val.neutral { color: var(--cyan); }
  .dm-compare-wrap { margin: 20px 0 8px; padding: 22px; background: var(--bg-2); border: 1px solid var(--line); }
  .dm-slider-row { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
  .dm-side-by-side { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  .dm-live-panel { background: var(--bg-0); border: 1px solid var(--line); padding: 18px; }
  .dm-live-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px; color: var(--ink-faint); }
  .dm-2x2 { display: grid; grid-template-columns: auto repeat(2, 1fr); gap: 3px; width: fit-content; margin: 0 auto; }
  .dm-2x2-corner { width: 36px; }
  .dm-2x2-head { font-family: var(--mono); font-size: 9px; color: var(--ink-faint); text-align: center; padding: 3px; letter-spacing: 0.05em; }
  .dm-2x2-row-head { font-family: var(--mono); font-size: 9px; color: var(--ink-faint); text-align: right; padding: 3px 6px 3px 0; align-self: center; letter-spacing: 0.05em; }
  .dm-2x2-cell { width: 80px; height: 56px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid var(--line); font-family: var(--mono); font-size: 12px; transition: background 0.35s ease, color 0.35s ease; }
  .dm-2x2-cell .cell-main { font-weight: 500; }
  .dm-2x2-cell .cell-sub { font-size: 9px; color: var(--ink-faint); letter-spacing: 0.05em; margin-top: 2px; }
  .dm-2x2-cell.diag { color: var(--phos); }
  .dm-2x2-cell.offdiag { color: var(--cyan); }
  .dm-2x2-cell.offdiag.zero-ish { color: var(--ink-faint); }
  .coherence-state-btn { background: var(--bg-0); border: 1px solid var(--line-bright); color: var(--ink-dim); font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 12px; cursor: pointer; transition: all 0.15s; }
  .coherence-state-btn.active { border-color: var(--cyan); color: var(--cyan); background: var(--bg-1); }
  .coherence-state-btn:hover:not(.active) { border-color: var(--line); color: var(--ink); }
  .coherence-display { display: grid; grid-template-columns: auto 1fr 1fr; gap: 20px; align-items: start; margin-top: 16px; padding: 20px; background: var(--bg-2); border: 1px solid var(--line); }
  .bloch-ball-wrap { display: grid; grid-template-columns: 280px 1fr; gap: 24px; margin: 20px 0 8px; padding: 22px; background: var(--bg-2); border: 1px solid var(--line); align-items: start; }
  .bloch-ball-host { width: 100%; max-width: 280px; aspect-ratio: 1; }
  .bloch-ball-host svg { width: 100%; height: 100%; }
  .t2-product-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
  .t2-outcome-chip { border: 1px solid var(--line); background: var(--bg-0); color: var(--ink-dim); font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; padding: 6px 8px; text-align: center; }
  .t2-outcome-chip.hot { border-color: var(--phos); color: var(--phos); background: rgba(127,255,196,0.08); }
  .hidden-state-challenge { margin: 20px 0 8px; padding: 22px; background: var(--bg-2); border: 1px solid var(--line); }
  .hidden-toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .hidden-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .hidden-card { border: 1px solid var(--line); background: var(--bg-0); padding: 14px; }
  .hidden-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 8px; }
  .hidden-guess-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
